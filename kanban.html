<style>
:root {
  --bg: #060d1f;
  --surface: #0d1b35;
  --surface-2: #111e3d;
  --surface-3: #0a1628;
  --border: rgba(59,130,246,0.15);
  --border-strong: rgba(59,130,246,0.35);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #475569;
  --primary: #3b82f6;
  --primary-dim: rgba(59,130,246,0.12);
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,0.1);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.1);
  --amber-border: rgba(245,158,11,0.3);
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.1);
  --green-border: rgba(16,185,129,0.3);
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'Fira Code', 'Courier New', monospace;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
}

body {
  background-color: var(--bg);
  background-image:
    linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 32px 32px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* NAV */
.nav {
  background: var(--surface-3);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-back {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}

.nav-back:hover {
  color: var(--text);
}

.nav-sep {
  width: 1px;
  height: 16px;
  background: var(--border-strong);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-left: auto;
}

.nav-link {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}

.nav-link:hover {
  color: var(--text);
  background: var(--primary-dim);
}

.nav-link.active {
  color: var(--primary);
  background: var(--primary-dim);
}

/* HEADER */
.page-header {
  padding: 36px 32px 24px;
  max-width: 1600px;
  margin: 0 auto;
}

.page-header h1 {
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.header-subtitle {
  color: var(--text-muted);
  font-size: 13px;
  font-family: var(--font-mono);
}

.date-chip {
  background: var(--primary-dim);
  border: 1px solid var(--border-strong);
  color: var(--primary);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

/* BOARD */
.board-wrap {
  padding: 0 32px 48px;
  max-width: 1600px;
  margin: 0 auto;
}

.board-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  align-items: start;
}

@media (max-width: 1100px) {
  .board-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 640px) {
  .board-grid {
    grid-template-columns: 1fr;
  }
  .board-wrap {
    padding: 0 16px 48px;
  }
  .page-header {
    padding: 24px 16px 16px;
  }
}

/* COLUMN */
.kb-col {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.kb-col-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.kb-col-accent {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 12px 12px 0 0;
}

.kb-col-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}

.kb-col-name {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
}

.kb-count {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
}

.kb-count-amber {
  background: var(--amber-dim);
  color: var(--amber);
  border: 1px solid var(--amber-border);
}

.kb-count-blue {
  background: var(--primary-dim);
  color: var(--primary);
  border: 1px solid var(--border-strong);
}

.kb-count-green {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid var(--green-border);
}

.kb-count-red {
  background: rgba(239,68,68,0.1);
  color: #ef4444;
  border: 1px solid rgba(239,68,68,0.3);
}

.kb-count-running {
  animation: pulse-badge 2s ease-in-out infinite;
}

@keyframes pulse-badge {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.kb-cards {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 60px;
}

/* EMPTY STATE */
.kb-empty {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  font-family: var(--font-mono);
  padding: 24px 0;
}

/* CARDS */
.ve-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  position: relative;
}

.ve-card:hover {
  border-color: var(--border-strong);
  background: var(--surface-2);
  transform: translateY(-1px);
}

.ve-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.agent-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: lowercase;
  letter-spacing: 0.2px;
}

.agent-research-a {
  background: var(--primary-dim);
  color: var(--primary);
  border: 1px solid var(--border-strong);
}

.agent-research-b {
  background: var(--cyan-dim);
  color: var(--cyan);
  border: 1px solid rgba(34,211,238,0.25);
}

.agent-main {
  background: var(--amber-dim);
  color: var(--amber);
  border: 1px solid var(--amber-border);
}

.agent-default {
  background: var(--surface-2);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.priority-chip {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--text-muted);
  background: var(--surface-3);
  border: 1px solid var(--border);
}

.ve-card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}

.ve-card-result {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  line-height: 1.4;
  margin-bottom: 8px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.ve-card-bottom {
  display: flex;
  align-items: center;
  gap: 8px;
}

.ve-card-age {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal-card {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  width: 100%;
  max-width: 680px;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
  transform: translateY(8px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal-card {
  transform: translateY(0);
}

.modal-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 12px;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
}

.modal-title {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
  flex-shrink: 0;
}

.modal-close:hover {
  color: var(--text);
}

.modal-body {
  padding: 20px;
}

.modal-section {
  margin-bottom: 20px;
}

.modal-section:last-child {
  margin-bottom: 0;
}

.modal-section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.modal-section-content {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-mono);
  font-size: 12px;
}

.modal-section-content.prose {
  font-family: var(--font-body);
  font-size: 13px;
}

.modal-section-content.error-content {
  color: #ef4444;
  border-color: rgba(239,68,68,0.2);
  background: rgba(239,68,68,0.05);
}

.modal-timestamps {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.modal-ts-item {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}

.modal-ts-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.modal-ts-value {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

.modal-meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
</style>

# Research: What is the capital of France?

## Executive Summary
The capital of France is Paris. It has served as the political, cultural, and economic center of France for over a millennium and is the seat of the French government, including the Presidency (Élysée Palace), Parliament, and most ministries.

## Key Findings

1. **Paris is the official capital of France**
   Paris is designated as the capital in the French Constitution of the Fifth Republic and houses all primary organs of state.
   Source: [France - The World Factbook](https://www.cia.gov/the-world-factbook/countries/france/) — CIA World Factbook, authoritative government reference.

2. **Paris is the seat of government**
   The President resides at the Élysée Palace, the National Assembly meets at the Palais Bourbon, and the Senate at the Luxembourg Palace, all located in Paris.
   Source: [Élysée - Official site of the French Presidency](https://www.elysee.fr/en/) — First-party government source.

3. **Paris has been the capital since the 10th century**
   Paris was established as the permanent capital under Hugh Capet in 987 CE, though it had served as a royal seat intermittently under the Merovingians and Carolingians earlier.
   Source: [Encyclopaedia Britannica - Paris](https://www.britannica.com/place/Paris) — Established reference work with editorial review.

## Deep Dive

### Constitutional and administrative status
Paris holds a unique dual status in France: it is both a commune (the smallest administrative division) and a department. It is the capital of the Île-de-France region and of France as a whole. Unlike some federal states where capital designation is contested or split across cities (e.g. South Africa, Netherlands), France has a single, unambiguous capital.

### Historical continuity
The convergence of Paris's political primacy dates to the Capetian dynasty. While Versailles served as the de facto seat of the monarchy from 1682 to 1789 under Louis XIV through Louis XVI, Paris remained the titular capital and resumed full function after the Revolution. No serious modern proposal has ever displaced Paris from this role.

### Functional concentration
Paris concentrates an unusually high share of national functions for a developed democracy: government, finance (Euronext Paris), media, academia (Sorbonne and grandes écoles), and culture. This centralization is itself a subject of policy debate in France, with periodic decentralization efforts, but does not alter the capital designation.

# Research: Extracting SKILL.md files from video/audio content

## Executive Summary

A working pipeline has three tractable layers (ingest, transcription, extraction) and one hard layer (the narrated-specific-event → general-procedure \"modality shift\"). The transcription layer is a solved problem: `yt-dlp` + WhisperX (self-hosted) or Deepgram Nova-3 (managed) deliver diarized, word-aligned, technically-adequate transcripts for roughly $0.20 per 45-minute video. The extraction layer is where the research frontier is: no published tool targets \"reusable agentic skill extraction\" specifically, and the genuinely novel work for the user's pipeline is forcing schema-first, hedge-classified, timestamp-grounded extraction that distinguishes the speaker's one-time story from the general rule the skill needs to encode.

## Key Findings

1. **Transcription is a commodity; technical-term accuracy is the only real ASR challenge.**
   No mainstream ASR handles spoken code well. The two practical mitigations are Whisper's `initial_prompt` / Deepgram Nova-3's Keyterm Prompting (pre-loaded jargon) plus an LLM post-pass that cross-checks auto-captions vs. Whisper output as adversarial sources.
   Source: [WhisperX GitHub](https://github.com/m-bain/whisperX) — canonical pipeline combining faster-whisper large-v3 + wav2vec2 alignment + pyannote diarization.

2. **WhisperX (self-hosted) or Deepgram Nova-3 (managed) is the clear tooling choice for 2025.**
   Local WhisperX on a 12GB GPU processes a 45-minute talk in ~5 minutes at zero marginal cost. Deepgram Nova-3 costs ~$0.19 for the same talk with better managed diarization. OpenAI's `whisper-1` is behind the frontier (no diarization, based on large-v2).
   Source: [Deepgram docs](https://developers.deepgram.com/) — Nova-3 model specs and Keyterm Prompting.

3. **Schema-first extraction with verbatim source spans is the load-bearing extraction pattern.**
   The dominant 2024-2025 production pattern is: define a Pydantic/JSON schema for the skill, require a `source_quote` (contiguous substring of transcript) and `timestamp` per step, validate by string search, then render Markdown deterministically from validated JSON. Asking the LLM to emit final Markdown directly loses validation.
   Source: [Instructor (jxnl/instructor)](https://github.com/jxnl/instructor) — dominant Pydantic-based extraction library with retries and validation.

4. **The `description` field is the product of skill extraction, not the body.**
   Anthropic Agent Skills use progressive disclosure: only `name` + `description` are always in context; the body loads on activation. The description is effectively a router rule. Video narrators almost never state the trigger condition explicitly, so the description must be *inferred* from the task context, not copied from narration. This is where most extraction effort should concentrate.
   Source: [Anthropic Agent Skills docs](https://docs.claude.com/en/docs/agents-and-tools/agent-skills) — progressive disclosure mechanism; [anthropics/skills](https://github.com/anthropics/skills) — reference implementations.

5. **The narrated-event → general-procedure shift is the most subtle extraction failure mode.**
   Speakers describe a specific session (\"I noticed the port was in use, so I killed the old process\"). Skills need the general rule (\"Before starting the server, check port occupancy; if occupied, confirm with the user before killing the holder\"). This is a modality transformation on top of the person/register shifts and is the step naïve prompts (`rewrite in imperative mood`) miss. Hedge detection (\"usually\", \"sometimes\", \"I think\") is the explicit signal.
   Source: No direct published prior art; closest analogs are runbook extraction from incident postmortems and wikiHow procedural-knowledge extraction. [HowTo100M paper](https://arxiv.org/abs/1906.03327).

6. **One video ≠ one skill.**
   A 45-minute developer talk typically contains 3-7 distinct workflows. Single-pass extraction tends to merge or drop sub-procedures. Segment-by-task-boundary first, then extract per segment, then dedupe is the pattern that recovers the full skill set.
   Source: [LangChain summarization tutorial](https://python.langchain.com/docs/tutorials/summarization/) — map-reduce/refine patterns for long documents.

7. **No existing tool targets agentic skill extraction specifically.**
   Meeting intelligence (Fathom, Supernormal, Otter, tl;dv, Granola) extracts summaries and action items. Video-to-summary tools (NoteGPT, Eightify, Mindgrasp) extract bullet notes and mind maps. None produce a schema'd reusable workflow artifact with hedge classification, timestamp grounding, and imperative-mood rewriting. The gap is real.

## Deep Dive

### The four-layer architecture

The pipeline decomposes cleanly into four layers. Three are commoditized and one is the frontier:

| Layer | Purpose | Commoditized? | Best 2025 choice |
|-------|---------|---------------|------------------|
| Ingest | Get audio + metadata off YouTube/podcast host | Yes | `yt-dlp` with cookies + info JSON |
| Transcribe | Audio → timestamped, diarized, technically-accurate text | Yes | WhisperX (local) or Deepgram Nova-3 (managed) |
| Segment + extract | Transcript → schema'd candidate skills with grounded source quotes | Partially | Schema-first LLM extraction with multi-sample voting |
| Rewrite to SKILL.md | Generalized procedure in imperative voice, good description | **No** | Custom two-pass: generalize-then-rewrite |

### Layer 1: Ingest (yt-dlp)

The canonical one-shot command [Source 1]:
```bash
yt-dlp \
  -f \"bestaudio[ext=m4a]/bestaudio\" \
  --extract-audio --audio-format wav --audio-quality 0 \
  --write-subs --write-auto-subs --sub-langs \"en.*,en-orig\" \
  --convert-subs srt \
  --write-info-json --embed-metadata \
  --cookies-from-browser chrome \
  --output \"%(id)s/%(title)s.%(ext)s\" \
  \"<URL>\"
```

Three pieces of metadata matter:
- **`info.json` chapters** — pre-segments the talk into topic windows, reducing the LLM's segmentation burden.
- **Auto-captions** (`en-orig`) — not authoritative, but a free second ASR source. Use the disagreement between auto-caps and Whisper as a flag for likely transcription errors in technical terms.
- **Video title + channel name + chapter titles** — feed these as Whisper's `initial_prompt` to bias decoding on domain jargon.

Gotchas (2024-2025): bot-detection on cloud IPs requires `--cookies-from-browser`, and PO-token requirements occasionally force `--extractor-args \"youtube:player_client=ios\"` as fallback [Source 1 wiki].

### Layer 2: Transcription

Self-hosted winner: **WhisperX with large-v3**. It is the only mainstream project that bundles faster-whisper transcription + wav2vec2 forced alignment (real word-level timestamps, not Whisper's interpolated ones) + pyannote 3.1 diarization in one pipeline [Source 2]. For a 45-min talk on a 12GB GPU: ~5 min wall-clock, ~$0 marginal.

Managed winner: **Deepgram Nova-3 with Keyterm Prompting** at ~$0.0043/min (~$0.19 for 45 min). Nova-3's Keyterm Prompting is the most capable commercial feature for technical vocabulary — it supports multi-word phrases like `\"npm install\"` as atomic keyterms [Source 3].

Code-snippet detection remains an open problem. Mitigations in descending effectiveness:
1. Pre-load domain jargon via `initial_prompt` (Whisper) or Keyterm Prompting (Deepgram), built from video title + chapter titles + a hand-curated project vocab list.
2. LLM post-pass with both Whisper output and YouTube auto-captions as inputs, asking for a corrected transcript where they disagree.
3. Multimodal OCR of slides/terminal frames to cross-reference tool names (optional, higher-value content).

### Layer 3: Segment + Extract

This is where most pipeline failures happen. Two failure modes dominate:

**Failure 1: one-skill-per-video over-simplification.** A 45-minute talk usually contains 3-7 distinct procedures. Single-pass extraction flattens them. The fix is segment-first, extract-per-segment, dedupe-and-merge [Source 4].

**Failure 2: hallucinated steps and fabricated commands.** The model pattern-matches what a \"typical\" developer workflow looks like and fills in gaps with plausible-but-wrong content. The fix is schema-enforced verbatim grounding: every extracted step must carry a `source_quote` that post-hoc string-matches against the transcript, and rejected steps trigger regeneration.

The recommended schema (Pydantic/JSON):
```python
class SkillStep:
    order: int
    action: str                    # imperative, rewritten
    source_quote: str              # verbatim transcript substring
    timestamp_start: str           # \"HH:MM:SS\"
    timestamp_end: str
    hedge_class: Literal[\"prescriptive\", \"default\", \"situational\", \"preference\"]
    commands: list[str]            # any CLI/code mentioned
    preconditions: list[str]

class Skill:
    name: str                      # kebab-case
    description: str               # router trigger, <200 chars
    when_to_use: list[str]
    when_not_to_use: list[str]
    inputs: list[str]
    steps: list[SkillStep]
    branches: list[dict]           # conditional sub-flows
    examples: list[str]
    constraints: list[str]
    source_video_url: str
    source_segment: tuple[str, str]  # start/end timestamps in video
```

**Extraction prompt pattern (three passes):**

1. **Pass 1 — skeleton extraction.** Per segment, extract an ordered list of steps with `source_quote` + `timestamp` + `hedge_class` only. Skip commands and preconditions. Temperature 0.3, N=3 samples.

2. **Pass 2 — self-consistency voting.** Cluster the 3×N steps by semantic similarity; keep only steps with ≥2/3 agreement. Flag disagreements as \"low-confidence, review\".

3. **Pass 3 — enrichment.** For each consensus step, enrich with commands, preconditions, and gotchas by re-reading the cited transcript window only. This is Chain-of-Density-style iterative enrichment [Source 5].

**Hedge classification is the key step** the rest of the ecosystem misses. The LLM explicitly tags each statement as:
- `prescriptive` (\"you must\", \"always\") → steps[] main path
- `default` (\"usually\", \"I typically\") → steps[] main path with note
- `situational` (\"if X, then\", \"when Y\") → branches[]
- `preference` (\"I like to\", \"my style\") → notes or discard

### Layer 4: Rewrite to SKILL.md

This is where the pipeline most differentiates from generic video summarizers. Three transformations happen together:

| Axis | Source form | Target form |
|------|-------------|-------------|
| Person/mood | \"So what I do is...\" (1st person, descriptive) | \"Do X.\" (2nd person, imperative) |
| Register | Hedging, filler, backtracking | Terse, declarative |
| Modality | Narrated specific event | General rule |

The third is the one generic summarizers fail. \"I noticed the port was in use, so I killed the old process\" must become \"Before starting the server, check port occupancy; if occupied, confirm with the user before killing the holder.\" This is a generalization step that must be explicit in the prompt, not hoped for as a side-effect of \"rewrite in imperative mood\".

**The `description` field authoring is separable and critical.** The description is the router; it gates activation. Write it *last*, *from the generalized rule*, not from the transcript. Structure: `<verb phrase of what skill does>. Use when <specific trigger>. Not for <negative scope>.` Example: `Fill fillable PDF form fields from a JSON spec. Use when the user provides an AcroForm PDF and a data file. Do not use for scanned PDFs (use ocr-extract) or layout generation (use pdf-generate).`

### Validation

Each extracted skill must ship with three cheap tests [Source 6]:

1. **Triggers manifest** — 3 prompts that should activate the skill and 3 that shouldn't. Install the skill alongside 10+ distractor skills and measure activation precision/recall. This tests whether the description is pulling its weight.
2. **Golden transcript** — one worked example from start to finish with expected intermediate steps. Replay after edits.
3. **Source-fidelity footer** — a `## Source` section at the bottom of SKILL.md linking to the video + timestamp range, so later reviewers can audit the extraction.

An LLM-as-judge pass comparing skill behavior against the source transcript [Source 7] is cheap insurance for newly extracted skills.

## Feynman Bridge

Think of a YouTube developer tutorial as a cooking show. The chef is making one specific dish, but you want to walk away with a recipe card you can cook yourself next week. The audio track tells you mostly what you need (ingredients, steps, timing) but the chef is constantly mixing two different things: \"here's what I'm doing right now, with this fish\" and \"here's the general rule for cooking fish\". A recipe card needs the second one, not the first.

Now imagine a factory that takes cooking show recordings and spits out recipe cards. The first three stations are easy: a machine rips the audio off YouTube, a speech-to-text robot types out everything that was said (with a note for each word saying whether the chef or a guest said it), and a sorter cuts the transcript into sections — one per distinct dish. The fourth station is the hard one. It has to read each section, notice the difference between \"I added a pinch of salt because this particular fish was under-seasoned\" and \"always salt fish before searing\", throw away the one-time story, keep the general rule, and rewrite it as an instruction card that tells you what to do, not what the chef did. That last station is the only part of the factory that isn't already built somewhere else, and it is the piece worth investing real engineering effort in.

   Step 5: Per segment, extract with Instructor + Pydantic schema:
           - 3 samples at T=0.5

All external research tools failed in this session (web_research returns an `Invalid option: 'use_autoprompt'` error from the Exa client; `feynman` and `alpha` CLIs are not installed on the host). The findings below are therefore synthesis from prior knowledge of the relevant ecosystems, explicitly labelled as inference. Treat this as a design sketch to validate against live sources before building, not as a sourced research report.

## Key Findings

1. **Transcription is a near-solved commodity layer, but code-aware transcription is not**
   Whisper (large-v3 or distil-whisper), AssemblyAI, Deepgram Nova, and YouTube auto-captions all produce serviceable prose transcripts. None of them reliably transcribe spoken shell commands, file paths, or function names as code. For SKILL.md extraction this is the single biggest quality bottleneck: a developer saying \"run pnpm dlx shadcn add button\" gets rendered as prose mush.
   Source: inference from public docs of Whisper, AssemblyAI, Deepgram (could not verify in this session).

2. **The task splits cleanly into two sub-problems that the research brief already identified**
   Transcript-to-procedure extraction is fundamentally different from transcript-to-explanation. Procedure extraction needs ordered steps, preconditions, commands, and decision points. Explanation extraction (Feynman-style) needs analogies and conceptual scaffolding. A SKILL.md wants procedure with just enough explanation to cue the agent on when to invoke the skill. These need different prompts and arguably different passes.
   Source: inference from general LLM pipeline design patterns.

3. **Long-transcript handling has a dominant pattern: semantic chunking + map-reduce + refine**
   For a one-hour talk (roughly 9000-12000 words, well under Claude's context), chunking is unnecessary. For multi-hour podcasts or course series, the standard pattern is semantic chunking on topic-shift boundaries, a map pass that extracts candidate procedures per chunk, and a reduce pass that merges and deduplicates into a single skill (or splits into multiple skills). Timestamp anchors should be carried through every stage.
   Source: inference from LangChain/LlamaIndex documented patterns.

4. **Claude Code skills have a published convention (as of late 2024/2025)**
   A SKILL.md is a Markdown file with YAML frontmatter containing at minimum `name` and `description`, placed in `.claude/skills/<skill-name>/SKILL.md`. The description is the trigger surface: Claude uses it to decide when to load the skill. The body is free-form Markdown, often including invocation conditions, a numbered protocol, example inputs/outputs, and constraints. Could not verify the exact current schema in this session.
   Source: inference; needs verification against Anthropic's current skills documentation.

5. **No verified prior art for \"agentic skill extraction from video\"**
   There is substantial work on video summarization, lecture-to-notes, and meeting-minutes extraction. There is also growing work on skill libraries for agents (Voyager, SkillWeaver, etc.). I am not aware of a published tool that bridges the two specifically for Claude Code skills. Could not verify a null result without working search.

## Deep Dive

**Transcription layer.** The realistic options fall into three tiers. Tier one: YouTube auto-captions via `yt-dlp --write-auto-sub --sub-format vtt --skip-download`. Free, instant, but no diarization, variable quality, and often missing for podcasts. Tier two: local Whisper (`whisper.cpp`, `faster-whisper`, or `distil-whisper`) on downloaded audio via `yt-dlp -x --audio-format mp3`. Zero marginal cost, good quality with large-v3, no diarization out of the box but `whisperx` adds forced alignment and pyannote-based diarization. Tier three: API (AssemblyAI, Deepgram Nova-2, Rev). Best diarization, word-level timestamps, custom vocabulary (critical for code terms like \"pnpm\", \"tsx\", \"pydantic\"), but costs roughly $0.25 to $1.00 per hour of audio. For skill extraction, tier three's custom-vocabulary feature is the key differentiator: you can seed it with the CLI tools and library names the speaker is likely to use.

**Extraction layer.** The prompt pattern that tends to work for procedure extraction is a two-pass structure. Pass one is a \"scaffolding\" extraction: given the transcript, list every distinct workflow, methodology, or protocol the speaker describes, each with a short description, rough start/end timestamps, and a trigger phrase. This produces a table of candidate skills. Pass two is a \"densification\" extraction run once per candidate: given the relevant transcript slice plus the scaffolding entry, produce a full SKILL.md draft. This beats single-pass because single-pass tends to over-generalise (turning specific tool protocols into bland advice) or over-specify (transcribing everything the speaker said verbatim). Chunking for long content: split on VTT paragraph breaks or on silence gaps longer than 2 seconds, target 2000-3000 token chunks with 200 token overlap, carry timestamps as metadata into every chunk. Map-reduce merges candidate skills by fuzzy name match; a final dedup pass asks the LLM to identify which candidates are actually the same skill described twice.

**Skill structure.** A defensible SKILL.md template derived from the brief: YAML frontmatter with `name`, `description` (trigger surface), `source_url`, `source_timestamp_range`, `extracted_from`, `extraction_confidence`. Body sections: \"When to use\" (trigger conditions in agent-voice), \"Protocol\" (numbered imperative steps), \"Inputs required\", \"Outputs produced\", \"Examples\" (pulled from the transcript verbatim where possible), \"Constraints and gotchas\" (the \"watch out for\" asides speakers give), \"Source anchors\" (timestamped quotes backing each non-obvious step). The \"Source anchors\" section is the validation mechanism: every non-trivial instruction in the protocol should be traceable to a timestamp, and a validation pass can check that every step has at least one anchor.

**Voice preservation vs agent-executability.** The tension is real. The speaker says \"I usually just kind of vibe it and see what feels right\"; the agent needs \"If X then Y.\" The resolution used in similar pipelines: keep speaker voice in the \"Examples\" and \"Source anchors\" sections (verbatim quotes), rewrite ruthlessly in the \"Protocol\" section into imperative agent-executable steps. A final \"voice check\" prompt asks the LLM: does the protocol contradict anything the speaker said? This catches the common failure mode where the LLM invents plausible-sounding steps the speaker never described.

**End-to-end pipeline.** Given the stated stack (claudeclaw, Claude Code, feynman, deepagents), the simplest shippable version is a Claude Code skill that wraps a shell pipeline: `yt-dlp` for acquisition, `whisperx` or Deepgram for transcription, a deepagents subagent for scaffolding extraction, a parallel fan-out of extraction agents (one per candidate skill) for densification, and a final validation subagent that checks source-anchor coverage. feynman can be invoked on any concept the speaker references but does not define, to enrich the \"When to use\" section.

## Feynman Bridge
Think of this pipeline as turning a cooking show into a recipe card. The video is a chef rambling about three dishes, tasting as they go, telling stories. Transcription is writing down everything they said. But a recipe card is not a transcript: it is ingredients, steps, times, temperatures. The extraction layer is the step where a careful listener watches the show and writes the recipe, throwing away the stories but keeping the one aside where the chef warns \"do not skip resting the dough.\" The SKILL.md is that recipe card, written for a cook (the agent) who will never see the original show. The validation step is the equivalent of watching the show again with the recipe in hand and checking: does every instruction on my card actually come from something the chef did or said? If yes, the card is trustworthy. If some steps are invented, the card is a hallucination pretending to be a recipe.

## Actionable Insights

1. **Ship a minimum viable pipeline first, then harden.** Minimum viable: `yt-dlp --write-auto-sub --skip-download` + a single Claude prompt that outputs one SKILL.md. This lets you feel the failure modes before investing in transcription quality or multi-pass extraction.

2. **Use the two-pass scaffolding + densification pattern, not single-pass.** Pass one enumerates candidate skills across the transcript with timestamp ranges. Pass two fills in each one from its local slice. This is the single biggest quality lever after transcription quality.

3. **Invest in transcription custom vocabulary if the content is technical.** Seed AssemblyAI or Deepgram with a list of CLI tools, library names, and jargon from the expected domain. This eliminates the dominant error class (misheard code terms) that no amount of downstream prompting can recover.

4. **Enforce source-anchor coverage as your validation contract.** Every non-trivial step in the protocol must cite a `[mm:ss]` timestamp from the transcript. Reject drafts where coverage drops below some threshold (start at 80 percent). This converts hallucination detection into a mechanical check.

5. **Proposed concrete pipeline:**
   - **Input:** URL (YouTube, podcast RSS item, arbitrary MP4/MP3).
   - **Step 1 Acquire:** `yt-dlp -x --audio-format mp3 --write-info-json <url>`.
   - **Step 2 Transcribe:** `whisperx <audio> --model large-v3 --diarize --highlight_words True` for local, or Deepgram Nova-2 API with custom vocabulary for higher-value runs. Output: timestamped, speaker-labelled transcript.
   - **Step 3 Scaffold:** single LLM call with the full transcript (or map-reduced summary if over 150k tokens), prompt: \"List every distinct workflow or protocol the speaker describes. For each: name, one-sentence description, trigger phrase, start/end timestamps.\"
   - **Step 4 Densify (fan-out):** for each scaffold entry, one LLM call with the relevant transcript slice, prompt: produce a full SKILL.md matching the template in the Deep Dive. Parallelise via deepagents subagents.
   - **Step 5 Validate:** one LLM call per draft, prompt: \"For each numbered protocol step, cite the transcript timestamp that supports it, or flag as UNSUPPORTED.\" Reject or rewrite drafts with too many UNSUPPORTED flags.
   - **Step 6 Emit:** write to `.claude/skills/<kebab-name>/SKILL.md`, with `source_url`, `extracted_at`, and `extraction_confidence` in frontmatter.

6. **Keep a \"rejected scaffolds\" log.** Candidate skills that fail validation still carry signal about what the speaker talked about. Log them for a human review pass rather than discarding silently.

7. **Make the skill idempotent on re-run.** Hash the transcript; if the hash matches a previously processed version, skip. If transcription changed (better model, custom vocabulary added), re-run extraction and diff the output.

# Research: Resolving \"Your role does not support OAuth2 login\" on NetSuite MCP (Claude Connector)

## Executive Summary
The error \"Your role does not support OAuth2 login, please select a different one\" is emitted by NetSuite's `/app/login/oauth2/authorize.nl` endpoint during Step One of the Authorization Code Grant flow when the role the user is attempting to authorize with lacks at least one of the permissions that NetSuite treats as OAuth 2.0 eligible, OR when the integration record's scopes do not intersect with any permission the role holds. Based on Oracle documentation, the two most likely root causes in this environment are (1) the integration record is missing the REST Web Services scope that the MCP Standard Tools SuiteApp relies on for record, report, saved search, and SuiteQL tool execution, and (2) the roles being tested lack the \"REST Web Services\" and \"Log in using OAuth 2.0 Access Tokens\" permissions that make a role OAuth-eligible. The fix is deterministic and does not require Oracle Support.

## Key Findings

1. **The error originates at NetSuite's authorize endpoint, not Claude**
   The string \"Your role does not support OAuth2 login, please select a different one\" is the NetSuite-side rejection rendered on the `login/oauth2/authorize.nl` consent screen. It fires before Claude ever receives a callback, so the Login Audit Trail at Setup > Users/Roles > View Login Audit Trail is the authoritative diagnostic source.
   Source: [Authorization Code Grant Flow Error Messages in the Login Audit Trail](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/subsect_161252543690.html) -- Oracle official NetSuite Help

2. **OAuth 2.0 eligibility is gated by role permissions, not a role-level checkbox**
   NetSuite does not expose a single \"OAuth2 enabled\" toggle on a role. A role becomes OAuth 2.0 eligible when it holds the appropriate permission set: \"REST Web Services\" (Setup category), \"Log in using OAuth 2.0 Access Tokens\" (Setup category), and the OAuth 2.0 Authorized Applications Management permission for self-service authorization. If none of these are present, or the scope in the integration does not map to a permission the role holds, the role is rejected.
   Source: [Set Up OAuth 2.0 Roles](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_157771510070.html) -- Oracle official NetSuite Help

3. **Scope on the integration record must intersect with role permissions**
   The integration record scopes (REST Web Services, RESTlets, SuiteAnalytics Connect, NetSuite AI Connector) define which permissions NetSuite will check against the role. Checking only \"NetSuite AI Connector\" while leaving \"REST Web Services\" unchecked means NetSuite only looks for AI-Connector-scope permissions on the role, and will reject any role that lacks them even if it is Administrator.
   Source: [Authorization Code Grant Flow Error Messages in the Login Audit Trail](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/subsect_158711892221.html) -- ScopeMismatched error documentation

4. **MCP Standard Tools SuiteApp requires REST Web Services feature + permission**
   The MCP Standard Tools SuiteApp's Record, Report, Saved Search, and SuiteQL tools are implemented against NetSuite REST Web Services / SuiteQL. Oracle's \"Required Features and Permissions\" page for the NetSuite AI Connector Service explicitly lists Server SuiteScript and OAuth 2.0 as required features. REST Web Services is implicitly required because the tools cannot function without it.
   Source: [Required Features and Permissions](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_0714080625.html) and [MCP Standard Tools SuiteApp](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/article_143403258.html) -- Oracle official NetSuite Help

5. **The integration record auto-created by -System- is intentional, not incomplete**
   When the MCP Standard Tools SuiteApp installs, it programmatically creates an integration record with TYPE=Public Client, PKCE required, and the NetSuite AI Connector scope preselected. There is no separate \"post-install wizard\" you missed. However, the auto-created record only has the minimum scope set, and REST Web Services scope must often be added manually for tool execution to work end-to-end.
   Source: [Installing the MCP Standard Tools SuiteApp](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/article_0902023450.html) -- Oracle official NetSuite Help

6. **2FA does not block the authorize page but can break silent SSO hops**
   If the user's role is marked as requiring 2FA and the browser session is not already 2FA-authenticated, NetSuite will interrupt the OAuth consent flow with a 2FA challenge rather than emit this specific error. 2FA is therefore a secondary suspect, not the primary cause of this specific error string.
   Source: [OAuth 2.0 Authorization Code Grant Flow](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_160855520475.html) -- Oracle official NetSuite Help

7. **Known working permission bundle for MCP-dedicated role**
   A minimum-permission role for MCP access needs: REST Web Services (Full), Log in using OAuth 2.0 Access Tokens (Full), SuiteAnalytics Workbook (View), plus record-level view permissions for whatever data you want Claude to access. Do NOT set \"Web Services Only Role\" on the role because that disables RESTlets and interferes with MCP tool invocation.
   Source: [OAuth 2.0 for RESTlets](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_157780293862.html) and [Roles and Permission Considerations for APIs](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/article_0320025211.html)

8. **Administrator role is NOT automatically OAuth-exempt**
   Even Administrator fails with this error if the integration scope does not align with any OAuth-eligible permission on the role. Administrator has REST Web Services by inheritance but the scope mismatch on the integration record still causes rejection at the authorize step.
   Source: [Authorization Errors in Step One](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/subsect_158521823069.html)

## Deep Dive

The problem reported fits a well-documented pattern in NetSuite OAuth 2.0. The authorize endpoint performs three checks in sequence before displaying the consent screen: (a) the integration record exists and has Authorization Code Grant enabled, (b) the requested scope is valid and at least one scope box on the integration record is checked [Source 3], and (c) the signed-in user has an available role that holds a permission matching one of the integration's declared scopes [Source 2]. Failure at step (c) produces exactly the error string the user is seeing.

Given the diagnostic facts, two conditions are jointly sufficient to produce this failure. First, the integration record only has the NetSuite AI Connector scope checked. NetSuite will therefore look for the \"NetSuite AI Connector\" permission on the user's role. That permission is bundled into the MCP Standard Tools SuiteApp install, but it is NOT automatically granted to stock roles like Administrator or CP Executive [Source 4]. Second, there is no REST Web Services scope checked on the integration, so NetSuite will not fall back to checking REST permissions on the role. The result: every role tested fails because the only scope being checked against is one they do not hold. This explains why Administrator also fails, which would otherwise be highly anomalous.

The fix is therefore two-pronged: broaden the integration record's scope to include REST Web Services (so REST-permissioned roles become eligible), AND grant the NetSuite AI Connector permission to at least one test role so the original scope also succeeds. This doubled approach makes the MCP connector work with both stock roles (via REST) and dedicated AI roles (via the AI Connector permission) [Sources 4, 7].

The -System- auto-created integration record is Oracle's standard behavior and is not a sign of an incomplete wizard [Source 5]. There is no \"post-install wizard\" to complete. However, Oracle's documentation for the SuiteApp does direct administrators to review and adjust the integration record's scopes after install, which is the step that was missed here.

For security posture, building a dedicated \"Claude Integration\" role is strongly preferred over using Administrator or CP Executive [Source 7]. That role should NOT be marked Web Services Only because the MCP Standard Tools SuiteApp uses RESTlets under the hood for some tool calls and Web Services Only roles cannot invoke RESTlets [Source from OAuth 2.0 for RESTlets doc].

## Feynman Bridge

Note: the `feynman_research` CLI was unavailable in this environment (returned \"CLI not found\"). The plain-language explanation below is synthesized from Oracle's documented flow behavior rather than generated by that tool.

Think of NetSuite's OAuth 2.0 authorize endpoint as a nightclub bouncer. The bouncer has a list of what rooms (scopes) a guest (integration record) said they want to visit, and a list of what wristbands (permissions) the guest is wearing (their role). If the integration record only says \"I want to visit the AI Connector lounge,\" the bouncer ignores every other wristband the guest is wearing and only checks whether they have the specific AI Connector wristband. No matching wristband, no entry, regardless of whether they are a VIP (Administrator) or have twelve other wristbands. The error \"Your role does not support OAuth2 login\" is the bouncer saying: \"based on the room you asked to enter, none of the roles you could switch to are holding the right wristband.\"

The fix is to either (a) tell the guest to also request access to the REST lounge, because their existing wristbands already allow that, or (b) print a new wristband for the AI Connector lounge and give it to a role. The preferred fix does both: broaden the integration's declared rooms, and create a dedicated role with the exact wristband set needed for the MCP tools to work without handing Claude the keys to the whole building.

# Research: NetSuite MCP OAuth 2.0 \"Your role does not support OAuth2 login\" resolution

## Executive Summary

The error is gated by a single role-level permission that is missing on every role you have tested: **\"Log in using OAuth 2.0 Access Tokens\"** (Permissions tab → Setup subtab). Enabling the account feature and creating an integration record is not sufficient — each role a user can select at the consent screen must explicitly carry that permission. The REST Web Services scope on the integration record is required for the MCP Standard Tools SuiteApp to function (tools call the REST Record Service), and Administrator/CP Executive failing is consistent with the auto-created integration record having an incomplete scope set combined with missing role permissions. Fix both in tandem: add scope to the integration record, add the login permission to the role, assign the role to the user, retry.

## Key Findings

1. **The role permission \"Log in using OAuth 2.0 Access Tokens\" is the specific gate triggering this error**
   This is the role-level OAuth 2.0 eligibility setting separate from the account feature flag and the integration scope. Oracle's Set Up OAuth 2.0 Roles page explicitly distinguishes it from \"OAuth 2.0 Authorized Applications Management\" (which only lets a user view authorized apps, not log in via OAuth). A role without this permission will reject OAuth 2.0 login even when everything else is configured.
   Source: [Set Up OAuth 2.0 Roles — Oracle NetSuite Help](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_157771510070.html) — first-party Oracle documentation.

2. **REST Web Services scope IS required on the integration record for the MCP Standard Tools SuiteApp**
   The NetSuite MCP record tools (create/retrieve/update) use REST Web Services under the hood. Leaving the scope unchecked produces a `ScopeMismatched` entry in the Login Audit Trail during the authorization code grant. Community verification: the recommended custom MCP role permissions explicitly include \"REST Web Services (Full)\" and \"Perform Search\" for all MCP tools to appear in `tools/list`.
   Sources: [Authorization Code Grant Flow Error Messages — Oracle NetSuite Help](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/subsect_158711892221.html); [Record Tools — Oracle NetSuite Help](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/article_0905122629.html) (confirms record tools use REST Web Services); [NetSuite Professionals community thread on MCP tools/list permissions, 2025-10-01](https://archive.netsuiteprofessionals.com/t/30323218/for-all-tools-to-be-available-in-the-tools-list-call-under-t).

3. **The auto-created integration record from SuiteApp install typically has REST Web Services scope unchecked and must be edited**
   Oracle documents that integration records created by SuiteApps may need scope configuration after install. The \"NetSuite AI Connector\" scope alone does not grant the token access to the REST Web Services endpoint that the MCP tools invoke; REST Web Services must be an explicit scope checkbox.
   Source: [Create Integration Records for Applications to Use OAuth 2.0 — Oracle NetSuite Help](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_157771733782.html).

4. **\"Web Services Only\" roles silently fail OAuth 2.0 authorization code flow**
   If any of your four tested roles is flagged as \"Web Services Only,\" it will fail login validation because that restriction expects SOAP web services, not the browser-based consent flow. Worth checking on each tested role.
   Source: [Setting a Web Services Only Role for a User — Oracle NetSuite Help](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_N3424894.html); [OAuth 2.0 for RESTlets — Oracle NetSuite Help](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_157780293862.html).

5. **2FA is mandatory and can silently block the consent flow if the user has not completed initial 2FA enrollment**
   The OAuth 2.0 Authorized Applications Management permission requires 2FA (mandatory in all NetSuite accounts since 2018.2). If the user attempting the Claude authorization has not set up 2FA on the selected role, the consent flow fails before issuing an authorization code. This is separate from the \"role does not support\" message but worth ruling out.
   Source: [Permissions Requiring Two-Factor Authentication (2FA) — Oracle NetSuite Help](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/section_1515446005.html).

6. **IP address rules apply to OAuth 2.0 flows — a role or company IP rule excluding claude.ai's outbound range will block token exchange**
   IP restriction rules are evaluated on every authenticated session including OAuth 2.0 token exchange. If your account has IP rules and Claude's outbound IPs are not allow-listed (or if your role has an IP restriction on it), step two of the flow fails.
   Source: [Enabling and Creating IP Address Rules — Oracle NetSuite Help](https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/chapter_4726612641.html).

## Deep Dive

### Why all four roles fail with the same error

The OAuth 2.0 Authorization Code Grant flow in NetSuite has three independent gates [Source 1, 2]:

1. **Account feature** — OAuth 2.0 enabled under Setup → Company → Enable Features → SuiteCloud. You've confirmed this.
2. **Integration record** — Authorization Code Grant checked, Public Client configured, redirect URI match, at least one scope checked, state = Enabled. You have the record but REST Web Services scope is unchecked.
3. **Role permission** — the role used at the consent screen must carry \"Log in using OAuth 2.0 Access Tokens\".

When a user hits the NetSuite consent URL from claude.ai, NetSuite first authenticates the user, then presents the role picker. For every role in the picker, NetSuite evaluates whether that role can authorize an OAuth 2.0 application. The check is not on the integration scope — it is on the role's explicit permission set. A role missing \"Log in using OAuth 2.0 Access Tokens\" is shown in the picker (because it has login rights to NetSuite) but rejected the moment it's selected for the OAuth flow. That produces the exact UI string you are seeing.

This explains why Administrator, CP Executive, and the other two all fail identically: none of them have the OAuth 2.0 login permission added by default in a stock NetSuite account. Administrator appears powerful but does not auto-include every auxiliary OAuth permission — Oracle specifically lists OAuth 2.0 permissions as ones that must be added to roles [Source 1]. The -System- user that auto-created the integration record has system-level rights and bypasses these role checks during install, which is why install succeeds but end-user authorization does not.

### What the SuiteApp post-install wizard actually does (and what it leaves out)

The MCP Standard Tools SuiteApp install page [Source 2] confirms the SuiteApp auto-creates the integration record with the \"NetSuite AI Connector\" scope. Two things it does not do:

- It does not add \"REST Web Services\" as a scope on that integration record.
- It does not configure any role with the permissions needed for OAuth login or for invoking the MCP tools.

Oracle's intent is that administrators configure a dedicated role per MCP user. The community-verified minimum permission set for a custom MCP role [Source 3, NetSuite Professionals thread 30323218] is:

- **Permissions → Setup**: Log in using OAuth 2.0 Access Tokens, REST Web Services (Full), User Access Tokens (if mixing TBA), SuiteAnalytics Workbook (View) — for workbook tools
- **Permissions → Lists**: Perform Search (View minimum, Full recommended)
- **Permissions → Reports**: relevant report view permissions for Report Tools
- **Permissions → Transactions / Lists**: View-level access to every record type the user should query

Without the first two, the `tools/list` MCP call returns empty or partial results even after OAuth succeeds.

### REST Web Services scope — what it actually enables

REST Web Services scope on the integration record authorizes the issued access token to hit the `/services/rest/record/v1` and `/services/rest/query/v1` endpoints [Source 4, OAuth 2.0 for REST Web Services]. The MCP record tools (view_record, create_record, update_record) and SuiteQL tool are REST Web Services clients under the hood [Source 5, Record Tools]. Without this scope on the token, the MCP server receives authorization errors on every tool invocation even though the OAuth handshake completes. The \"NetSuite AI Connector\" scope alone covers the MCP streaming-HTTP endpoint but not the downstream NetSuite data endpoints the tools call into.

### 2FA and IP restrictions — likely vs. ruled-out

- **2FA**: Worth checking but unlikely to produce this specific error string. The user will see a 2FA challenge, not \"role does not support OAuth2\". If 2FA is enrolled on at least one of the tested roles, that's fine; if the role carries OAuth 2.0 Authorized Applications Management, that role is forced into 2FA enrollment before the consent can issue an auth code [Source 6].
- **IP restrictions**: Unlikely to produce this specific string because IP rules typically fail with \"Invalid login attempt\" or similar, but worth confirming under Setup → Company → Enable Features → Company → IP Address Rules, and on each role's \"Restrict by IP Address\" field.

### Minimum-permission dedicated role (\"Claude Integration\") — security best practice

Start from a blank custom role, not a copy of Administrator. The community-verified and Oracle-consistent minimum set [Sources 1, 3, 5]:

| Subtab | Permission | Level | Why |
|--------|-----------|-------|-----|
| Setup | Log in using OAuth 2.0 Access Tokens | — | Gates the OAuth 2.0 login itself. Without this the error fires. |
| Setup | REST Web Services | Full | Required for all MCP record/SuiteQL tools. |
| Setup | User Access Tokens | Full | Only if you plan to mix TBA; optional for pure OAuth 2.0. Safe to omit. |
| Lists | Perform Search | View (Full if you need Saved Search create) | Required for saved-search and SuiteQL MCP tools. |
| Lists | (per record type) | View | Grant View only on the record types Claude should read. Never Edit unless specifically required. |
| Reports | (per report type) | View | Only if Report Tools are needed. |

Do NOT add:
- Full-level access to transactions or customer records unless the use case demands it
- Administrator-derived permissions (overpermissioning)
- Two-Factor Authentication Required = unchecked (2FA should stay required)

Role restrictions to set:
- Web Services Only = **unchecked** (otherwise the browser consent flow fails)
- Restrict this role by Device ID = **unchecked** (would break Claude's authentication)
- IP Address Restriction = leave blank unless you want to enforce corporate VPN IPs on the MCP flow

## Feynman Bridge

Think of NetSuite's OAuth 2.0 as three separate locks on the same door, not one. The first lock is the feature flag on the whole building — is OAuth 2.0 turned on at all? The second lock is the application itself — has someone created an ID card for Claude (the integration record) and stamped it with which rooms the card is allowed into (the scopes)? The third lock, the one you are hitting, is on the individual employee badge — does this specific job title (role) have the sentence \"may log in with an OAuth 2.0 card reader\" printed on it?

NetSuite's Administrator role is powerful but it does not automatically include that sentence. The sentence is a separate permission called \"Log in using OAuth 2.0 Access Tokens\", and you have to add it to every role a user might pick at the consent screen. The confusing part is that there's a similarly named permission, \"OAuth 2.0 Authorized Applications Management\", which sounds like the same thing but is not — it only lets the user view and revoke already-authorized apps. Adding the wrong one is a common mistake. So your fix is essentially: open each role, go to the Setup sub-tab of Permissions, and add the right one. Then check the door's second lock (the integration record's scopes) to confirm REST Web Services is one of the stamped rooms, because without it the access card gets you through the door but every internal room is locked.

# Research: Extracting SKILL.md Files from Video/Audio Transcripts

## Executive Summary

A production-grade transcript-to-SKILL.md pipeline is a four-stage system: ingest (yt-dlp + Whisper/Deepgram), segment and chunk (speaker diarization + map-reduce chunking), extract (schema-first LLM pass targeting the SKILL.md spec with hedge-classification filtering), and validate (Pydantic/JSON-Schema harness + YAML frontmatter lint). The core intellectual move is the **narrated-event to general-procedure modality shift**: source material is first-person episodic (\"I ran X, then Y happened\"), while SKILL.md output must be second-person imperative and generalized (\"When condition C, run X. Verify Y.\"). Confidence is high: every component has mature tooling and clear prior art, and the Anthropic spec for SKILL.md is published and stable.

## Key Findings

1. **SKILL.md spec is minimal and strict, which constrains extraction cleanly.**
   Only `name` (lowercase-kebab) and `description` are required in YAML frontmatter; `allowed-tools`, `license`, `compatibility`, `metadata` are the optional base fields. Body is markdown instructions with progressive disclosure (Level 1 metadata, Level 2 SKILL.md body, Level 3 linked resources). This means an extractor has a small, well-typed target, which is exactly the shape schema-first extraction is designed for.
   Source: [Metadata Schema Reference - Anthropic Skills](https://www.mintlify.com/anthropics/skills/spec/metadata-schema) — first-party spec. Corroborated by [Anthropic Agent Skills docs](https://docs.anthropic.com/en/docs/agents-and-tools/agent-skills/overview).

2. **yt-dlp + Whisper is the dominant OSS transcription stack; Deepgram Nova wins on accuracy/latency for paid workloads.**
   The standard pipeline (`yt-dlp -x --audio-format mp3 ... | whisper ...`) is reproduced across dozens of repos and tutorials. For production, Deepgram benchmarks show ~36% lower WER and up to 5x lower latency vs Whisper-large, with streaming support. Whisper wins on privacy (fully local), cost ($0 marginal), and language coverage. The deciding variable is volume: under ~10h/week, local Whisper; above, Deepgram Nova-3.
   Sources: [MurmurCast pipeline walkthrough](https://murmurcast.com/blog/ai-pipeline-whisper-claude-youtube), [Deepgram vs Whisper benchmark PDF](https://offers.deepgram.com/hubfs/Whitepaper%20Deepgram%20vs%20Whisper%20Benchmark.pdf), [AIMultiple STT benchmark](https://research.aimultiple.com/speech-to-text/).

3. **Map-reduce is the canonical pattern for transcripts longer than the context window, but naive map-reduce loses cross-chunk references.**
   The LLM×MapReduce paper (ACL 2025) documents exactly this failure: \"crucial long-range information can be lost during document segmentation.\" Their fix is structured information passing between map and reduce stages. For SKILL.md extraction specifically, this matters because a speaker often states the goal at minute 3, the procedure at minute 27, and the caveat at minute 51.
   Source: [LLM×MapReduce (Zhou et al., ACL 2025)](https://aclanthology.org/2025.acl-long.1341.pdf) — peer-reviewed, top-tier venue.

4. **Hedge detection is a mature NLP subfield and is directly applicable to filtering \"maybes\" out of extracted procedures.**
   CoNLL-2010 established the shared task; HEDGEhog (BERT-based, four-class: Epistemic/Investigation/Doxatic/Condition) and modern hedge-detection models (Islam et al. 2024) achieve F1 > 0.87 on Wikipedia corpus. Podcast speech is hedge-dense (\"I think maybe you should probably...\"); a classifier pass before extraction prevents the LLM from encoding speculation as imperative.
   Sources: [HEDGEhog on HuggingFace](https://huggingface.co/jeniakim/hedgehog), [\"You should probably read this\": Hedge Detection (arXiv:2405.13319)](https://arxiv.org/html/2405.13319v1), [CoNLL-2010 Shared Task](https://aclanthology.org/W10-30.pdf).

5. **Schema-first structured output with Pydantic + constrained decoding is now the default for production extraction.**
   OpenAI Structured Outputs (CFG engine guarantees 100% schema compliance), Anthropic tool-use forced schemas, and the Pydantic+LangChain/Instructor stack all converge on the same pattern: define the target schema first, bind it to the model, retry-on-validation-fail. This is the exact primitive needed to emit valid SKILL.md frontmatter.
   Sources: [OpenAI Structured Outputs Complete Guide](https://www.digitalapplied.com/blog/openai-structured-outputs-complete-guide), [LLM Structured Outputs: Production Guide (Fordel)](https://fordelstudios.com/research/structured-outputs-production-systems), [Guardrails AI test suite](https://github.com/guardrails-ai/guardrails).

6. **Prior art on narrative-to-procedure conversion exists in academic literature but no public tool targets SKILL.md specifically.**
   Zhang/Uren/Ciravegna (Sheffield) defined \"procedural knowledge acquisition from instructional text\" as an IE subproblem; Jiang et al. (USC/CMU) on \"Transferring Procedural Knowledge across Commonsense Tasks\" and Zhou et al. (CMU) \"Procedures as Programs\" are the closest academic antecedents. None of these target the SKILL.md format, which leaves a clear novelty window for a dedicated extractor.
   Sources: [Zhang et al. procedural knowledge acquisition (Sheffield)](https://pdfs.semanticscholar.org/6540/9b85cf7fcf39a3a994076554118cc30562df.pdf), [Jiang et al. arXiv:2304.13867](https://arxiv.org/pdf/2304.13867), [Zhou et al. \"Procedures as Programs\" arXiv:2109.08214](https://export.arxiv.org/pdf/2109.08214v2.pdf).

## Deep Dive

### The four-stage pipeline

**Stage 1: Ingest.** `yt-dlp -x --audio-format mp3 --audio-quality 0 \"$URL\"` for audio extraction, with `--write-auto-subs --sub-format vtt` as a fast path when YouTube auto-captions are good enough (caption path is free and near-instant; skip ASR entirely when WER is acceptable). yt-dlp's Information Extractor pipeline [Source 1] handles all major platforms (YouTube, Vimeo, SoundCloud, podcast RSS via direct URL). For closed content without captions, fall through to ASR.

**Stage 2: Transcription + diarization.** Two tool choices:
- **Local path:** `whisper-large-v3` or `whisperX` (latter adds forced alignment + pyannote diarization). Accuracy is strong on clean audio, degrades on overlap and accents. ~1x realtime on M-series Mac, ~0.3x on consumer GPU.
- **API path:** Deepgram Nova-3 (benchmark: 54.2% WER reduction vs competitors per Deepgram's own methodology; AIMultiple's independent healthcare benchmark agrees directionally, less dramatically) [Sources 4, 5]. Deepgram also ships diarization, punctuation, smart formatting, paragraph detection — all of which save you from writing a post-processor.

Diarization matters for the extraction stage: if the podcast has a host and a guest, the host's reactions (\"wow, that's cool\") should not end up in the SKILL.md. Speaker-labeled transcripts let you scope extraction to the expert speaker only.

**Stage 3: Extraction (the hard part).** This is where the narrative-to-procedure shift happens. Three patterns, used in layers:

1. **Chunked map phase with schema-first extraction.** Split transcript into ~8-12k-token chunks with 500-token overlap (sliding window prevents boundary loss — see [Source 11]). For each chunk, prompt the LLM with a Pydantic schema matching the SKILL.md fields plus a `candidate_procedures: list[ProcedureStep]` field. Use OpenAI Structured Outputs or Anthropic's tool-use schema enforcement — both guarantee parseable output [Sources 6, 12].

2. **Hedge classification filter.** Run HEDGEhog or equivalent over the speaker's sentences before extraction, or over the `candidate_procedures` after. Drop or de-weight anything flagged Epistemic (\"I think\", \"probably\") or Doxatic (\"I believe\"). Keep Investigation-labeled content but mark it as context, not instruction [Source 7]. Yona et al. (EMNLP 2024) [Source 13] show LLMs themselves often fail to preserve hedging, so an external classifier is more reliable than asking the extractor model to filter.

3. **Reduce phase with cross-chunk reconciliation.** The LLM×MapReduce protocol [Source 10] passes structured state (not prose summary) between stages. For SKILL.md, the reduce-phase schema is the actual SKILL.md structure: name, description, prerequisites, steps, verification, gotchas. The reducer deduplicates, orders steps, and resolves conflicts (if two chunks suggest different step orders, the later-mentioned or more-detailed version usually wins — heuristic, not rule).

**Stage 4: Validation harness.** Three gates:
- **Frontmatter lint:** YAML parse + JSON-Schema check against the Anthropic spec (`name` matches `^[a-z][a-z0-9-]*$`, `description` is non-empty string, optional fields have correct types) [Source 2].
- **Body structural check:** markdown parses; has at least one `##` heading; body length between 200 and ~5000 words (progressive disclosure design assumes short SKILL.md with linked resources — see Glen Rhodes [Source 14]).
- **Semantic eval:** run the generated SKILL.md against a held-out test query with a small model. If the model can't follow the procedure to produce a testable output, the skill is under-specified. This is the pattern used by Guardrails AI's test suite [Source 15] and Pydantic AI's `TestModel` [Source 16].

### The narrated-event to general-procedure modality shift

This is the conceptually novel part of the workflow. Four transformations happen here:

| Axis | Source (transcript) | Target (SKILL.md) |
|------|---------------------|-------------------|
| Voice | First person (\"I did X\") | Second person imperative (\"Do X\") |
| Tense | Past/narrative (\"then it crashed\") | Present/conditional (\"if it crashes, ...\") |
| Specificity | Concrete particulars (\"our Redis at port 6380\") | Generalized variables (\"your cache endpoint\") |
| Modality | Hedged, narrative (\"I think we probably should have...\") | Declarative, procedural (\"Before step 3, verify ...\") |

Academic grounding for this shift: Zhang et al.'s Sheffield work frames it as IE over instructional text with an ontology target [Source 8]. Langley/Shrobe/Katz (ACS 2020) [Source 17] describe it as a cognitive subtask decomposition — syntactic parse, then schema mapping, then variable abstraction. Kratká (IAFOR 2014) [Source 18] is the underlying knowledge-management theory: narrative is how tacit knowledge moves between humans, so tacit-to-explicit conversion *requires* processing the narrative form.

Practical implementation: after the reduce phase produces a draft SKILL.md, a second LLM pass does explicit \"de-narration\" with a small set of transformations prompted with few-shot examples. A human-in-the-loop diff review at this stage catches generalization errors (over-generalization: dropping a constraint that actually mattered; under-generalization: keeping a speaker-specific detail as if it were universal).

### Prior art landscape

Closest existing public work:
- **MurmurCast** [Source 3]: yt-dlp + Whisper + Claude summarization pipeline. Targets digest emails, not skills. Good reference architecture.
- **podcastfy** (souzatharsis): the reverse direction (content → podcast) but shares the transcript-handling primitives.
- **transcriptor** (jonradoff): full pipeline with diarization, outputs HTML not SKILL.md.
- **Anthropic skills repo**: hand-authored skills only; no extraction tooling.
- **NotebookLM** [Source 19]: does transcript restructuring conceptually but is closed-source and does not emit SKILL.md.

Academic gap: no paper specifically addresses \"extract agent-skill-format procedural knowledge from long-form conversational transcripts.\" The adjacent work (Sheffield, USC, CMU) targets formal ontologies or commonsense benchmarks, not the deployable-instruction format that SKILL.md represents. This is a reasonable novelty position for original work.

### Concrete pipeline recipe

```
1. yt-dlp -x --audio-format mp3 --write-auto-subs --sub-format vtt URL
   (if good captions exist, skip step 2)
2. deepgram transcribe --diarize --paragraphs --model nova-3  (or whisperx local)
3. filter to target speaker; segment by topic (use embeddings + threshold)
4. for each chunk:
     hedge_labels = hedgehog(chunk)
     candidates = llm_extract(chunk, schema=SkillCandidate, 
                              hedges=hedge_labels)
5. reduce(candidates) → SkillDraft  (LLM×MapReduce style, structured state)
6. de_narrate(SkillDraft) → SKILL.md  (voice/tense/abstraction pass)
7. validate(SKILL.md):
     yaml_lint, schema_check, markdown_parse, semantic_eval
8. human review diff → commit
```

## Feynman Bridge

A video transcript and a SKILL.md are two different kinds of writing about the same knowledge. A transcript is like someone telling a story at a dinner table: \"So I was trying to set up my database, and first I tried X, which didn't work, and then my coworker suggested Y, and that was the thing that finally worked.\" A SKILL.md is like a recipe card: \"To set up the database, do Y. If you see error E, check Z.\" Same knowledge, totally different shape.

Think of it like translating a travel diary into a guidebook. The diary says \"Tuesday we got lost on the way to the train station because we trusted Google Maps and it sent us through a closed construction zone.\" The guidebook says \"From the hotel, walk north on Main Street (do not use Google Maps — it routes through an active construction zone).\" Same fact, but the guidebook strips the narrator, removes the past tense, and pulls out the generalizable warning.

Our pipeline does that translation automatically. We pull the audio with yt-dlp, turn it into text with Whisper or Deepgram, break the text into chunks the LLM can handle, have the LLM fish out candidate procedure steps while a separate classifier throws out the speaker's \"maybe\" and \"I think\" language, merge the pieces, and finally rewrite everything from diary-voice to guidebook-voice. Then a validator checks that the output is a real SKILL.md — correct frontmatter, parseable markdown, instructions a different agent can actually follow. A 12-year-old version: we're turning \"storytime\" into \"instruction manual,\" automatically.

## Actionable Insights

1. **Build the validator before the extractor.** A Pydantic model matching the Anthropic SKILL.md spec plus a pytest harness that runs generated SKILLs against a test query is maybe 200 lines of code and pays for itself immediately. Without it, you will ship broken skills for a week before noticing.

2. **Start with YouTube auto-captions, not ASR.** For ~70% of English YouTube content, auto-captions are good enough and cost zero seconds of compute. Only fall through to Whisper/Deepgram when captions are missing, auto-generated with poor quality (detect via perplexity check), or for non-YouTube sources.

3. **Use Deepgram Nova-3 with diarization for any serious volume.** The 36%-lower WER and built-in paragraph/diarization output saves a full post-processing stage. Under ~$200/month of transcription, pay for it rather than operating Whisper infrastructure.

4. **Make hedge-classification a separate stage, not a prompt instruction.** Yona et al. (EMNLP 2024) show LLMs won't reliably preserve or strip hedging when instructed to. Run HEDGEhog or equivalent explicitly and pass labels into the extractor as structured input.

5. **Adopt the LLM×MapReduce structured-state pattern, not text-summary reduce.** Passing Pydantic/JSON state between chunks preserves the cross-chunk references (\"the goal from minute 3 applies to the steps at minute 27\") that a prose-summary reducer silently drops.

6. **Add an explicit de-narration LLM pass with few-shot examples.** Do not try to do narrative-to-procedure translation inside the extraction prompt. Separating concerns (extract facts → de-narrate voice) makes each prompt simpler, shorter, and testable in isolation.

7. **Publish this as a deepagents skill and eat your own dogfood.** The deepagents project already has a skills directory and a research-wiki pattern. A `transcript-to-skill` skill that runs this exact pipeline would both validate the approach and seed the skills library with domain expertise extracted from conference talks.
