# Research: Extracting SKILL.md Files from Video/Audio Transcripts

## Executive Summary
A robust pipeline chains three stages: (1) audio acquisition and transcription via yt-dlp plus Whisper or Deepgram, (2) schema-first structured extraction of procedural atoms from the transcript using map-reduce over chunks with hedge classification to filter uncertain claims, and (3) a modality shift pass that converts first-person narrated events into imperative general procedures formatted as SKILL.md with YAML frontmatter. Prior art exists in fragmented form (ytpipe, TubeScribe, youtube-knowledge-extractor skill, cefriel's procedural-KG pipeline, How2Everything), but no open tool combines all stages end-to-end with a validation harness (skillcheck, skrills-validate, claudelint cover the linting layer).

## Key Findings

1. **SKILL.md is a progressive-disclosure format with a strict YAML contract**
   A SKILL.md folder requires exactly one `SKILL.md` file (case-sensitive) with YAML frontmatter containing `name` (kebab-case, must match parent directory) and `description`. Optional folders: `scripts/`, `references/`, `assets/`. Only the name and description (~200 bytes) are loaded at agent startup; the body loads on match.
   Source: [YAML Frontmatter - Anthropic Skills](https://www.mintlify.com/anthropics/skills/creating-skills/frontmatter) and [Skill Structure reference](https://github.com/corca-ai/claude-plugins/blob/main/references/anthropic-skills-guide/03-skill-structure.md) -- official and mirrored Anthropic docs.

2. **yt-dlp + Whisper/Deepgram is the dominant transcription stack**
   Multiple open pipelines (ytpipe, youwhisper-cli, TubeScribe, yt-text) converge on yt-dlp for audio extraction followed by faster-whisper, whisper.cpp, or a cloud engine (Deepgram Nova, OpenAI, Gemini). Deepgram Nova wins on latency and streaming; Whisper large-v3 wins on cost at rest and language breadth. Deepgram's own benchmark claims accuracy and speed advantages but is a vendor document.
   Source: [TubeScribe repo](https://github.com/prateekjain24/TubeScribe), [ytpipe](https://pypi.org/project/ytpipe/), [Deepgram vs Whisper benchmark (vendor)](https://offers.deepgram.com/hubfs/Whitepaper%20Deepgram%20vs%20Whisper%20Benchmark.pdf), [aimultiple independent benchmark](https://research.aimultiple.com/speech-to-text/).

3. **Map-reduce is the canonical pattern for long transcripts**
   Podcasts and conference talks regularly exceed single-context windows. The map step chunks transcript into overlapping windows (typically 1.5k-4k tokens), emits structured candidate steps per chunk, and the reduce step merges, deduplicates, and resolves conflicts into a unified procedure graph. Stuffing fails above ~30 min of audio; refine preserves coherence but costs more.
   Source: [LangChain summarize_map_reduce docs](https://python.langchain.com/docs/how_to/summarize_map_reduce), [Scaling Document Summarization (Soni)](https://medium.com/@sonimegha1602/scaling-document-summarization-with-llms-stuffing-map-reduce-and-refine-a8a468d479c3).

4. **Hedge detection is a well-studied primitive for filtering uncertain claims**
   Speakers hedge constantly (\"I think you could maybe try...\"). The CoNLL-2010 shared task and downstream work (HedgeHunter, HEDGEhog) provide token-level classifiers that label spans as epistemic, doxatic, investigation, or condition hedges with ~0.89 F1. Using a hedge classifier as a gate lets the extractor promote only asserted steps to the SKILL.md body and demote hedged content to a \"Notes / caveats\" section.
   Source: [\"You should probably read this\": Hedge Detection in Text](https://arxiv.org/html/2405.13319v1), [HedgeHunter](https://aclanthology.org/W10-3017/), [HEDGEhog model](https://huggingface.co/jeniakim/hedgehog).

5. **Schema-first extraction with Pydantic or JSON Schema beats freeform generation**
   Rather than asking the LLM for markdown directly, define a Pydantic model (ProcedureStep with fields: action_verb, object, preconditions, rationale, hedge_level, timestamp, source_quote). The model emits validated JSON; a deterministic renderer converts JSON to SKILL.md. This separation is what Sourcery, LangExtract, and LlamaIndex's PydanticProgramExtractor all implement.
   Source: [Sourcery: schema-first extraction framework](https://github.com/jolovicdev/sourcery), [LlamaIndex PydanticExtractor](https://docs.llamaindex.ai/en/stable/examples/metadata_extraction/PydanticExtractor/), [Structured Outputs guide](https://myengineeringpath.dev/genai-engineer/structured-outputs/).

6. **The narrated-event to general-procedure shift is an abstraction operation**
   Narrators say \"so then I ran npm install and it broke because I had node 18.\" A SKILL.md requires \"1. Verify Node >= 20 before running `npm install`.\" The shift has four moves: (a) detach from past tense and first person (strip \"I did\"), (b) lift particulars to preconditions (\"node 18\" becomes \"older Node versions\"), (c) recast failures as guardrails, (d) convert temporal sequence into dependency order. Work on goal-oriented script construction and WikiHow hierarchies formalizes this as script induction from narrative.
   Source: [Show Me More Details (ACL 2022)](https://arxiv.org/abs/2203.07264), [Goal-Oriented Script Construction](https://paperswithcode.com/paper/goal-oriented-script-construction), [How2Everything (2026)](https://allenai.org/papers/how2everything).

7. **Procedural KG extraction gives a sound intermediate representation**
   Cefriel's prompt-based pipeline extracts steps, actions, objects, equipment, and temporal relations into a typed graph, then serializes. This intermediate KG layer is exactly what you want between the raw transcript and the final SKILL.md: it makes the reduce step a graph merge (not a text diff) and makes validation inspectable.
   Source: [cefriel/procedural-kg-llm](https://github.com/cefriel/procedural-kg-llm), [Human Evaluation paper](https://www.arxiv.org/pdf/2412.03589).

8. **Validation harnesses already exist and enforce cross-agent portability**
   skillcheck, skill-tools-plugin, skrills-validate, and claudelint all lint SKILL.md: frontmatter schema, name/folder match, description discoverability scoring, token budget tiers, file-reference integrity, and cross-agent compatibility (Claude Code is permissive, Codex CLI and Copilot CLI are strict). A reddit-reported failure mode: skills that load in Claude Code fail silently in VS Code when `name` does not match the parent directory.
   Source: [skillcheck](https://github.com/moonrunnerkc/skillcheck), [skill-tools-plugin](https://github.com/skill-tools/skill-tools-plugin), [skrills-validate crate](https://docs.rs/skrills-validate/latest/skrills_validate/), [claudelint](https://claudelint.com/integrations/claude-code-plugin).

9. **Direct prior art: youtube-knowledge-extractor skill**
   The `sdrabent/youtube-knowledge-extractor` skill on ClawHub/OpenClaw already does multimodal YouTube analysis via transcript plus frame extraction, producing step-by-step guides. It declares yt-dlp, ffmpeg, python3, and curl as required binaries. A simpler cousin `abe238/youtube-summarizer` only summarizes. Neither performs an explicit hedge-classification pass or emits a nested SKILL.md, so there is an open gap.
   Source: [youtube-knowledge-extractor on ClawHub](https://clawhub.ai/sdrabent/youtube-knowledge-extractor), [youtube-summarizer SKILL.md](https://github.com/openclaw/skills/blob/main/skills/abe238/youtube-summarizer/SKILL.md).

## Deep Dive

**Stage 1: Acquisition and transcription.** yt-dlp handles YouTube, podcast RSS enclosures, Vimeo, and most other sources via `--extract-audio --audio-format wav`. If the source already has captions (YouTube auto-captions, conference `.vtt`), pull them first and skip ASR [Source 4, yt-text]. Otherwise choose a transcriber by workload: local `faster-whisper` with `large-v3` for privacy or scale at rest, Deepgram Nova-3 for speaker diarization and low-latency streaming [Source 10, 11]. Store transcripts as JSON with word-level timestamps so later stages can cite source quotes into the SKILL.md \"provenance\" section.

**Stage 2: Schema-first extraction over map-reduce.** Define a Pydantic schema with fields for the atomic procedure step (action, object, tool, precondition, expected outcome, failure mode, hedge level, source timestamp). Chunk the transcript with 10-20% overlap so step boundaries are not severed; LangChain's `MapReduceDocumentsChain` or a hand-rolled asyncio fanout both work [Source 7]. Map step prompt: \"Extract ProcedureStep instances from this chunk; return [] if the chunk is pure narration with no action.\" Reduce step performs entity alignment, dedupe, and dependency ordering, ideally against a procedural KG intermediate [Source 8, cefriel]. Run hedge classification (HEDGEhog or a GPT-class zero-shot classifier trained on CoNLL-2010 labels) on each extracted step's supporting span [Source 5, 6]. Steps with epistemic/doxatic hedge level above threshold get routed to a `## Caveats` section rather than the main imperative body.

**Stage 3: Modality shift.** This is the linguistically hardest move and the one no existing open tool does well. The input is past-tense first-person narration of a particular event; the output must be present-tense imperative general procedure. Concretely: \"I ran `npm install` and got ERESOLVE\" becomes \"Run `npm install`. If ERESOLVE appears, pin peer deps with `--legacy-peer-deps` or upgrade the conflicting package.\" This requires four operations grounded in the script-induction literature [Source, ACL 2022 wikihow_hierarchy; How2Everything]: tense/person normalization, variable lifting (proper nouns to role names), failure-to-guardrail conversion, and dependency reordering. Implement it as a dedicated LLM pass with a few-shot prompt containing paired narration/procedure examples, then validate the output contains no first-person pronouns and every verb is imperative or infinitive.

**Stage 4: SKILL.md rendering.** Deterministic Jinja template consumes the validated JSON/KG and emits:

```yaml
---
name: <kebab-case derived from video title>
description: <when to use, first-person neutral, <=1024 chars>
version: 0.1.0

# <Title>

## When to Use
...

...

## Procedure
1. ...
2. ...

## Caveats
<hedged content with source timestamps>

## Provenance

```

The `name` field must match the parent directory or VS Code will silently ignore it [Source 9, skillcheck reddit]. Description must be discoverable: include the triggering verbs the agent should match on (\"This skill should be used when...\" pattern from anthropics/claude-plugins-official skill-development skill).

**Stage 5: Validation harness.** Run skillcheck or skrills-validate as a post-hook: frontmatter schema, name/folder match, description length, file references exist, token budget within tier. Add project-specific checks: (a) no first-person pronouns in the procedure section (regex), (b) every step has a cited timestamp in Provenance, (c) hedge-classifier reports < X% hedge density on main body. Running the generated skill against a held-out test prompt (\"do the thing this skill claims to teach\") and scoring the result with an LLM judge gives an end-to-end quality signal analogous to How2Judge in the How2Everything framework [Source, How2Everything].

**Prior-art gap.** youtube-knowledge-extractor and youtube-summarizer produce guides or summaries but not self-contained SKILL.md files with the schema-first, hedge-gated, modality-shifted pipeline described here. Procedural-kg-llm does the extraction graph but not the SKILL.md output. skillcheck validates but does not generate. The opportunity is a glue skill that orchestrates all five stages.

## Feynman Bridge
Note: feynman CLI was unavailable (not installed in this environment); the following is a plain-language synthesis from the cited sources rather than a CLI-grounded explanation.

Think of a talk transcript as a travel diary written in first person: \"I took the 8am train, got lost in Rome, finally found the museum at 3pm.\" A SKILL.md is the opposite: it is a guidebook for anyone who wants to visit the museum. The pipeline is the translator between the two. First you get the diary text (yt-dlp pulls audio, Whisper or Deepgram turns audio into words). Then you read the diary carefully in small chunks because it is too long to read in one breath (map-reduce), picking out every action the author actually performed. Some of what the author says is firm (\"I bought a ticket\") and some is guesswork (\"I think maybe the 2pm one is cheaper\"); a hedge classifier sorts those into two piles so the guidebook only tells readers to do what was actually confirmed to work.

The hardest translation step is turning \"I got lost, then found the museum\" into \"Exit the station on the south side and follow Via del Corso.\" That requires stripping the I, dropping the specific time, and turning a remembered mistake into a general warning. This is the same trick computational linguists use to mine WikiHow: take a narrative and induce the underlying script. The final guidebook gets a structured cover page (YAML frontmatter) so the agent librarian knows when to hand this particular book to a reader, and a linter checks the cover matches the spine (folder name equals the `name` field) before the book ships.

## Actionable Insights

1. **Build the pipeline in five separable stages** -- acquire (yt-dlp), transcribe (Whisper/Deepgram), extract (schema-first map-reduce with Pydantic), shift modality (dedicated LLM pass), render + validate (Jinja + skillcheck). Keep each stage behind a JSON boundary so you can swap tools.

2. **Use captions before ASR when they exist** -- YouTube auto-captions, conference VTT files, and podcast show-notes-with-transcripts skip a costly step. Fall back to Whisper large-v3 locally or Deepgram Nova-3 for streaming/diarization.

3. **Adopt a Pydantic schema for ProcedureStep early** -- fields: action_verb, object, tool, precondition, expected_outcome, failure_mode, hedge_level (enum), source_timestamp, source_quote. Every downstream stage reads and writes this type.

4. **Gate promotion to the main body with a hedge classifier** -- route epistemic/doxatic hedged spans to a `## Caveats` section with preserved source quotes. Use HEDGEhog or a zero-shot GPT classifier calibrated against CoNLL-2010 labels.

5. **Write an explicit modality-shift prompt** -- few-shot with 5-8 narration/procedure pairs, then post-validate that the output contains zero first-person pronouns and every step starts with an imperative verb. This is the move most prior tools skip.

6. **Wire skillcheck or skrills-validate into CI** -- enforce name-matches-directory, description discoverability, token budget, and file-reference integrity. Add a project rule that every step in `## Procedure` must have a timestamp in `## Provenance`.

7. **Evaluate end-to-end with an LLM-judge loop** -- following How2Judge, give the generated skill to a fresh agent and ask it to perform the task; score success. Low scores feed back into better extraction prompts.

# Research: Extracting SKILL.md files from video and audio transcripts

## Executive Summary
A production workflow to mine Claude Code `SKILL.md` files from talks, podcasts, and YouTube content has four stages: (1) ingest with `yt-dlp` plus a transcription engine (local Whisper for cost, Deepgram Nova for diarized podcasts, OpenAI Whisper API for zero-ops), (2) schema-first LLM extraction with hedge classification and map-reduce over chunks, (3) a narrated-event to general-procedure rewrite pass, and (4) a validation harness modeled on Anthropic's `skill-creator` evals. The SKILL.md spec is fixed: YAML frontmatter with `name` and `description`, imperative-voice body, progressive-disclosure references, all under ~500 lines for auto-loading.

## Key Findings

1. **SKILL.md is a two-layer artifact: trigger metadata plus lazy-loaded body.**
   A skill is a directory containing `SKILL.md` with required YAML frontmatter (`name`, `description`) and an imperative-voice body; supporting `scripts/`, `references/`, `examples/`, and `assets/` load only when the skill is invoked. At startup Claude pre-loads only the name and description of every installed skill, and full body content enters context only when a request matches.
   Source: [Extend Claude with skills (Anthropic docs)](https://docs.anthropic.com/en/docs/claude-code/skills) -- canonical spec from Anthropic.
   Source: [Skill Development by anthropics/claude-code](https://skills.sh/anthropics/claude-code/skill-development) -- quoted directory layout and imperative-voice rule.

2. **yt-dlp + Whisper is the community default ingest stack.**
   Multiple open-source packages (`ytpipe`, `yt-transcribe`, `youtube-faster-whisper`) wrap `yt-dlp` audio extraction into `faster-whisper` or `whisper.cpp`, confirming the pattern: `yt-dlp -x --audio-format mp3 <url>` then feed to a Whisper variant, optionally parallelized across channel batches.
   Source: [ytpipe on PyPI](https://pypi.org/project/ytpipe/) -- active package, documents yt-dlp plus faster-whisper pipeline.
   Source: [yt-transcribe on PyPI](https://pypi.org/project/yt-transcribe/0.2.0/) -- whisper.cpp variant with parallel workers.

3. **Deepgram Nova wins on diarization and streaming; Whisper wins on cost and local deployment.**
   Independent 2024-2026 benchmarks place Deepgram Nova-3 at roughly 5.9% WER streaming with built-in speaker diarization and sub-300ms latency, while Whisper is batch-only but deployable locally at near-zero marginal cost. For multi-speaker podcasts and conference Q&A, Deepgram's diarization is the deciding factor; for solo talks, local Whisper is sufficient.
   Source: [Speko 2026 STT benchmark](https://speko.ai/blog/best-stt-providers-2026) -- independent ranked benchmark.
   Source: [Deepgram vs Whisper benchmark whitepaper](https://offers.deepgram.com/hubfs/Whitepaper%20Deepgram%20vs%20Whisper%20Benchmark.pdf) -- vendor report but with published WER numbers.

4. **Schema-first extraction plus constrained decoding is the reliability pattern.**
   Production practice converges on JSON Schema or Pydantic-typed output with constrained decoding (Outlines, llguidance, or Anthropic tool-use) rather than regex post-parsing. Field-level trustworthiness scoring (Cleanlab's CONSTRUCT) and canonicalization layers (PromptPort's ROS/CSS metrics) are emerging defenses against \"format collapse.\"
   Source: [Structured Outputs in Production (Tianpan)](https://tianpan.co/blog/2025-10-11-structured-outputs-in-production) -- synthesis of current practice.
   Source: [CONSTRUCT: Real-Time Trustworthiness Scoring (arXiv)](https://arxiv.org/pdf/2603.18014) -- per-field uncertainty for extraction.

5. **Unsupervised step extraction from transcripts is a published research area.**
   LUSE (Berkeley, CVEU 2023) zero-shot-prompts an LLM to segment steps from instructional-video transcripts. Unsupervised Task Graph Generation (arXiv 2302.09173) combines LLM reasoning with clustering to recover step dependencies. Video-Mined Task Graphs (Ashutosh et al., UT Austin/Meta) mines procedural structure across many how-to videos.
   Source: [LUSE paper](https://cveu.github.io/2023/papers/36.pdf) -- direct prior art for transcript-to-steps.
   Source: [Unsupervised Task Graph Generation (arXiv 2302.09173)](https://arxiv.gg/abs/2302.09173) -- LLM + clustering for step dependency.

6. **Hedge classification is a mature NLP task with shippable models.**
   CoNLL-2010 established the shared task; `jeniakim/hedgehog` on Hugging Face is a BERT-based multi-class hedge detector (Epistemic, Investigation, Doxatic, Condition) usable off-the-shelf to strip speculative language before procedure generalization.
   Source: [HEDGEhog on Hugging Face](https://huggingface.co/jeniakim/hedgehog) -- deployable model.
   Source: [\"You should probably read this\": Hedge Detection in Text (arXiv 2405.13319)](https://arxiv.org/html/2405.13319v1) -- SOTA on CoNLL-2010.

7. **Map-reduce summarization is the canonical pattern for long transcripts.**
   For content exceeding context limits, the map step extracts structured candidates per chunk, the reduce step deduplicates and merges. LLM×MapReduce (arXiv 2410.09342) formalizes this with structured information protocols and in-chunk confidence to resolve conflicts across chunks.
   Source: [LLM×MapReduce (arXiv 2410.09342)](https://arxiv.org/html/2410.09342v1) -- formal treatment for long-sequence LLM processing.
   Source: [Google Cloud: long document summarization](https://cloud.google.com/blog/products/ai-machine-learning/long-document-summarization-with-workflows-and-gemini-models) -- production patterns.

8. **Anthropic ships a reference validation harness.**
   The `skill-creator` skill and `mcp-builder/scripts/evaluation.py` in `anthropics/skills` demonstrate Anthropic's approach: run parallel test cases with and without the skill, capture timing and token usage, measure triggering accuracy by testing ~20 rephrasings of the description, and produce an interactive reviewer.
   Source: [skills/skill-creator/SKILL.md](https://github.com/anthropics/skills/blob/main/skills/skill-creator/SKILL.md) -- reference implementation.
   Source: [mcp-builder evaluation.py](https://github.com/anthropics/skills/blob/main/skills/mcp-builder/scripts/evaluation.py) -- concrete harness code.

## Deep Dive

The full workflow decomposes into six stages that map cleanly onto the requested topics.

**Stage 1: Ingest.** Use `yt-dlp -x --audio-format opus --audio-quality 0 <url>` for YouTube and most podcast feeds; opus is cheaper than mp3 and Whisper handles it directly. For RSS podcasts, parse the enclosure URL and skip yt-dlp. Cache audio by content hash so re-runs of extraction do not repay transcription cost [Source 1, 2].

**Stage 2: Transcription.** Route by content type. Solo talk or single-speaker screencast goes to local `faster-whisper large-v3` with VAD filtering. Panel, interview, or podcast goes to Deepgram Nova-3 with `diarize=true` and `punctuate=true`; the diarization is what makes subsequent speaker-attributed extraction tractable. Conference recordings with jargon go to Whisper with an `initial_prompt` containing a glossary. Always persist both the raw transcript and a timestamped segment list so the final SKILL.md can cite `[HH:MM:SS]` anchors [Source 3, 4].

**Stage 3: Preprocessing.** Run a hedge classifier over every sentence. Epistemic hedges (\"I think\", \"maybe\", \"we usually\") and Doxatic hedges (\"I believe\") get flagged, not deleted. The flags feed the next stage: the extractor must either demote a hedged claim to a non-normative \"Context\" section or drop it. HEDGEhog is the pragmatic choice; it returns token-level labels compatible with segment boundaries [Source 5, 6]. Also run speaker-role inference (host vs guest vs audience) and drop audience Q&A by default.

**Stage 4: Schema-first extraction with map-reduce.** Define a Pydantic or JSON Schema model:

```
SkillCandidate {
  name: str (slug),
  description: str (trigger conditions, imperative),
  preconditions: list[str],
  steps: list[Step { index, instruction, rationale?, hedge_level }],
  failure_modes: list[str],
  examples: list[str],
  source_anchors: list[Timestamp]
}
```

Map step: chunk the transcript to ~3-4k tokens with 200-token overlap, run the schema-constrained extractor per chunk using Anthropic tool-use or OpenAI Structured Outputs. Reduce step: cluster candidates by `name` and semantically-similar descriptions, merge steps preserving order from timestamps, union preconditions and failure modes. LLM×MapReduce's structured information protocol with confidence scores is the template for resolving conflicts across chunks [Source 7, 8]. Use a CONSTRUCT-style trustworthiness score per field to flag low-confidence extractions for human review [Source 9].

**Stage 5: Narrated-event to general-procedure rewrite.** This is the most underappreciated stage. A transcript says \"so what I did was I ran `npm install`, and then it failed, so I added `--legacy-peer-deps`.\" The SKILL.md must say: \"Install dependencies. If resolution fails with peer conflicts, retry with `--legacy-peer-deps`.\" The modality shift rules:

- First-person past (\"I ran\", \"we noticed\") becomes imperative infinitive (\"Run\", \"Check for\"). Anthropic's own spec requires imperative/infinitive voice, not second person [Source 2].
- Anecdotal single-case outcomes (\"it worked for me\") become conditional rules (\"If X, then Y\").
- Speaker-specific context (\"in our monorepo\") becomes explicit preconditions in the frontmatter description or an \"Applies when\" block.
- Hedged claims flagged in Stage 3 are either dropped or moved to a \"Caveats\" reference file.

Prior art on this shift: \"From We to Me\" (arXiv 2603.03320) treats narrative reframing as abductive reasoning; \"Transferring Procedural Knowledge across Commonsense Tasks\" (arXiv 2304.13867) studies abstracting stories into transferable procedures. Neither targets SKILL.md but both validate the rewrite-with-explicit-schema approach.

**Stage 6: Validation harness.** Mirror `anthropics/skills/skill-creator`:

1. Lint frontmatter: `name` is a valid slug, `description` contains trigger verbs and use-case phrases, body is under ~500 lines.
2. Triggering accuracy: generate 20 paraphrased user prompts that should invoke the skill and 20 that should not, measure precision/recall of auto-invocation [Source 10].
3. Task evals: construct 5-10 test prompts that require the skill, run Claude with and without the skill loaded, grade outputs with an LLM-judge rubric, log tokens and latency [Source 11, 12].
4. Source fidelity: for each claim in SKILL.md, verify the cited timestamp anchor contains supporting content (an LLM-judge check against the transcript segment).
5. Round-trip: execute one example end-to-end if the skill is executable.

Prior art beyond Anthropic: `skills.sh`, `Tessl`, and `agentskills/agentskills` (16K stars, spec repo) are independent directories and package managers converging on the same SKILL.md shape, which suggests the spec is stable enough to target.

## Feynman Bridge

Note: `feynman` CLI was not installed on this runner; the grounding below synthesizes the cited sources directly rather than a feynman_research transcript.

Think of a conference talk as someone narrating a trip they took once: \"I drove to the coast, I almost missed the exit, and the burger at the diner was great.\" A SKILL.md is a road atlas a stranger can use to make the same trip next week. The workflow is the translator between the two. Transcription turns speech into text. Hedge detection finds the \"I think\" and \"maybe\" parts and sets them aside, because atlases do not say \"maybe turn left.\" Schema-first extraction forces the model to fill in a fixed form (name, steps, preconditions, failure modes) instead of writing a free-form essay, so downstream tools can parse it reliably. Map-reduce handles the fact that a two-hour podcast does not fit in one LLM call: you chop it up, extract candidates per chunk, then merge duplicates.

The trickiest move is the modality shift. Stories are in the past tense and personal (\"we upgraded and it broke\"); procedures are in the imperative and general (\"before upgrading, snapshot the database; if the upgrade fails, restore from snapshot\"). This is not summarization, it is re-grounding, and the existing research (LUSE, Video-Mined Task Graphs, Transferring Procedural Knowledge) shows LLMs can do it when given a schema and explicit voice instructions. Finally, the validation harness is what separates a plausible SKILL.md from a trustworthy one: it confirms the skill triggers on the right prompts, that its claims trace back to a real timestamp in the source, and that using it actually improves Claude's task performance versus not using it.

## Actionable Insights

1. **Pin the transcription router by content type.** Route solo talks to local `faster-whisper large-v3`, multi-speaker to Deepgram Nova-3 with diarization, jargon-heavy to Whisper with a glossary `initial_prompt`. Cache by audio content hash.

2. **Make the extraction schema non-negotiable.** Use Anthropic tool-use or OpenAI Structured Outputs against a Pydantic `SkillCandidate` model. Include `source_anchors: list[Timestamp]` on every step so validation can round-trip to the transcript.

3. **Run HEDGEhog before extraction, not after.** Token-level hedge tags feed the schema as a `hedge_level` field, which the rewrite stage uses to decide whether a claim becomes a step, a caveat, or gets dropped.

4. **Implement map-reduce with explicit dedup keys.** Map emits candidates per 3-4k-token chunk with 200-token overlap; reduce merges on `name` slug similarity plus description embedding cosine above a threshold. Preserve step order by earliest timestamp.

5. **Add a dedicated \"narrative-to-procedure\" rewrite pass.** Do not fold it into extraction. Prompt explicitly: convert first-person past to imperative infinitive, convert anecdotes to conditionals, extract speaker-specific context into preconditions.

6. **Copy Anthropic's skill-creator eval harness wholesale.** Build 20 positive and 20 negative trigger prompts, 5-10 task prompts with and without the skill, LLM-judge rubric for source fidelity against transcript segments. This is the minimum bar to ship.

7. **Treat sub-500-line SKILL.md as a hard constraint; push everything else to `references/`.** The progressive-disclosure architecture depends on keeping the always-indexed portion small. Move rationale, caveats, and extended examples to `references/*.md` with their own frontmatter.

This gives `pip install roadrunner-cli` and a `roadrunner` CLI entry point without touching the file location. The copy-in model still works. If the project grows beyond ~1,500 lines and needs splitting into modules, that's when you convert to a `roadrunner/` package — but that's a separate ADR from packaging format.

---

### 4. Task Sequencing for ~9 Tasks

Dependency graph:

```
T1: pyproject.toml          (no deps — unblocks T3 and T8)
T2: CONTRIBUTING.md         (no deps — pure docs, can go anywhere)
T3: mypy config             (depends_on: T1 — needs toml for mypy settings)
T4: analyze command         (no hard deps — but naturally after T3 so typing is clean)
T5: init command            (no hard deps)
T6: unblock command         (no hard deps — quick, 30-50 lines)
T7: SessionEnd hook         (no hard deps — delegates to existing snapshot command)
T8: PyPI release workflow   (depends_on: T1 — pyproject.toml is the package manifest)
T9: watch command           (no hard deps — lowest priority, goes last)
```

**Linear (hard deps):** T1 → T3 → (mypy passes before new commands land), T1 → T8

**Parallel-eligible (no hard deps between them):** T2, T4, T5, T6, T7, T9

For a single-agent sequential loop, suggested order of appearance in `tasks.yaml` (loop picks top eligible):

```
T1 → T2 → T3 → T6 → T7 → T4 → T5 → T8 → T9
```

Rationale: knock out pyproject.toml and docs first (T1, T2), then mypy (T3) so the codebase is typed before new commands land, then quick wins (T6 unblock, T7 SessionEnd hook), then the bigger commands (T4 analyze, T5 init), then PyPI workflow (T8), then optional watch (T9).

---

### 5. Scope Warnings

**`init` command**: Scope creep risk is real. The temptation is to make it detect existing git repos, check Python version, offer platform-specific paths, etc. Hard cap: create directory structure, write three files (`tasks/tasks.yaml` stub, `.claude/settings.json`, `CLAUDE.md` template), make hooks executable. If the user already has some of these, warn and skip — don't overwrite. No interactive prompts in the loop.

**mypy config**: The TypedDicts in `roadrunner.py` all use `total=False` — deliberately permissive. Strict mypy will flag a lot of `dict | None` call sites and potentially every `task.get(\"id\")` usage. Recommendation: start with `--ignore-missing-imports` and `--warn-return-any`, not `--strict`. Strict can be a task on its own later. Don't let it block the packaging tasks.

**`watch` command**: If it ships, it must be a thin wrapper. No curses, no rich, no blessed. Just formatted output from `tail -f`. Real risk: it becomes a \"nice UI\" rabbit hole that adds a dependency and complexity for minimal operational value. I'd leave it off the tasks.yaml or mark it explicitly as `priority: low` with a clear scope cap in the task definition.

**Flat layout and copy-in compatibility**: The `init` command needs to know where the bundled hook templates live. If roadrunner is installed via pip, `roadrunner.py` and the `hooks/` directory are in the package — `importlib.resources` is how you access them. If it's a copy-in, they're in the same directory. The `init` implementation needs to handle both. This is the one non-obvious design constraint for the init task — include it in the acceptance criteria, not as a surprise mid-task.

**Single-file constraint**: At ~1,000 lines, the file is at the readable limit. Adding `analyze`, `init`, `unblock`, and `watch` will push it past 1,400. That's still fine for a single-file tool, but name this as a known tension. If the project hits 1,600+ lines, the conversation about splitting into a `roadrunner/` package becomes worth having — but that's a future ADR, not a constraint on the current 9 tasks.

# morning-brief-data.sh
set -e

VAULT=\"/Users/alex/Documents/Obsidian/claudeclaw\"
DB=\"/Users/alex/dev/claudeclaw/store/claudeclaw.db\"
CUTOFF=$(date -v-12H +%s)   # macOS; swap for: date -d '12 hours ago' +%s on Linux

echo \"\"

  2>/dev/null \
  | sed 's/.*\(- \[ \] \|☐ \)//' \

  \"SELECT agent_id, title, substr(result,1,120)

**LangChain / LangGraph**
The incumbent. 126K GitHub stars, $260M raised, $1.25B valuation, ~$16M ARR. LangGraph (their stateful graph runtime) hit v1.0 late 2024 and is the de facto enterprise-grade choice for complex workflows. Earns revenue via LangSmith (observability) at $500/mo for teams. Dominant in search (27K monthly searches). Their moat is distribution, not architecture.

Conversation-driven multi-agent coordination. v0.4 dropped Jan 2025, complete redesign for production robustness. Microsoft is the distribution play here — embedded into Azure AI Studio, GitHub Copilot ecosystem. Not a standalone company, so pricing pressure from enterprise agreements. Favored by ML-heavy teams who want conversational delegation between agents.

**Agno**
Minimalist Python runtime positioning as \"agents as infrastructure.\" Production-first from the start — cloud deployment, built-in state, observability. Targets teams who find LangGraph too heavy and CrewAI too opinionated. Smaller community but growing. Closest thing to a \"just works\" framework for Python shops.

Explicitly experimental. No state persistence, no error handling, OpenAI themselves say don't use in production. It's a learning tool, not a platform.

**Claude Agent SDK (Anthropic)**
Newer entrant. Native tool-use, strong reasoning, positioned around safety/control. Anthropic's play is model-level differentiation rather than framework dominance. Developer adoption growing but smaller surface area than LangChain.

---

### Pricing Models

| Layer | Model | Range |
|---|---|---|
| Frameworks (OSS) | Free | $0 |
| Observability (LangSmith etc.) | Subscription | $0-$500+/mo |
| Token costs (LLM API) | Usage | $200-$2,000/eng/mo at scale |
| Enterprise licenses | Negotiated | Custom |
| Cloud platforms (Azure AI Studio, AWS Bedrock Agents) | Usage + subscription | Variable |

The core frameworks are free. The cost is tokens and operational complexity. This matters for offer design — you're not competing on software, you're competing on expertise in making the software not blow up.

---

### Who's Buying and Why

**Primary buyers:**
- Engineering teams at Series A-C SaaS companies who built an agent demo, got stakeholder excitement, and now need to productionize it
- Ops-heavy SMEs (logistics, legal, finance, insurance) trying to automate multi-step knowledge work
- Enterprise innovation teams inside larger orgs (usually with a budget, no delivery expertise)

**Why they're buying help:**
- Gartner: only 14% of orgs with agentic AI have it deployment-ready; 11% actively in production
- 40% of agentic projects predicted canceled by 2027 due to cost overruns, complexity, risk
- Token costs surprise everyone — $2K/eng/mo at even modest usage is a shock
- Framework lock-in regret is real (CrewAI → LangGraph rewrites are now a documented category)
- Observability and governance are afterthoughts until something fails in prod

**The ICP in one sentence:** A technical founder or engineering lead who shipped an agent demo in 3 weeks and has now spent 3 months trying to make it reliable, cost-efficient, and explainable to their CTO.

---

### Where the Market Is Heading

Three clear vectors:

1. **Consolidation around LangGraph + cloud runtimes.** LangGraph, AutoGen, and Agno will absorb most serious production work. CrewAI becomes the prototyping tool that feeds them. The no-code builders (n8n, Dify) will capture the SMB/citizen-developer tier.

2. **Observability becomes the differentiator.** Frameworks are commoditizing. The next layer — tracing, cost control, human-in-the-loop approval flows, agent evaluation — is where value will concentrate. LangSmith is early evidence. Expect 3-5 funded companies specifically in agent observability by end of 2026.

3. **Platform embedding kills DIY for average enterprises.** Salesforce Agentforce, Microsoft Copilot Studio, Google Vertex AI Agents — the big platforms are shipping opinionated, integrated, \"just buy this\" agent stacks. Average enterprises (not tech-native) will land there and never touch the OSS frameworks.

Gartner: 40% of enterprise apps will embed task-specific AI agents by end of 2026, up from <5% now. Market projects $7.8B → $52B by 2030 (46% CAGR). Most of that growth is in the platform tier, not OSS frameworks.

---

### Gaps Worth Paying Attention To

**Gap 1: The production gap.** Only ~25% of orgs experimenting with agents have successfully scaled to prod. This is the clearest service opportunity — productized \"agent hardening\" that takes a working prototype and makes it observable, cost-efficient, failure-resistant, and handoff-ready.

**Gap 2: Framework migration.** CrewAI → LangGraph rewrites are painful and documented. Nobody has packaged this as a cleanly scoped, fixed-price migration offer. It's currently custom consulting work done at agency hourly rates.

**Gap 3: Agent cost auditing.** Token costs blindside teams. A productized \"agent cost audit\" — 2-week engagement, here's where you're bleeding tokens, here's the fix — solves an immediate, quantifiable pain.

**Gap 4: Governance/oversight layer.** 38% of users trust agents for routine tasks; drops to 20% for anything with financial stakes. Human-in-the-loop approval flows and audit trails are frequently missing. This is especially relevant in regulated industries.

---

### Risks to Any Offer Here

- **Frameworks ship fast.** What's a pain today gets a native feature in 90 days. Offers need to be process/outcome-oriented, not tool-specific.
- **Big consulting already moving in.** Deloitte, McKinsey, Accenture all publishing frameworks-as-service content. They'll own the enterprise tier. You'd be going mid-market/SMB.
- **Platform capture.** Salesforce Agentforce and Copilot Studio will absorb a chunk of buyers who'd otherwise need help choosing frameworks. Reduces addressable market for framework-specific offers.
- **Buyers are cheap about implementation.** The frameworks are free. Getting budget approved for \"help implementing free software\" requires strong ROI framing.

---

### Recommendation

**Conditional go.** Not on building *around the frameworks themselves* — that's commoditizing fast and the big platforms are eating it. The signal is on the **execution gap**: companies have agents that don't work in production, cost too much to run, and nobody internally knows how to fix it.

That's a real, expensive, recurring problem. And it maps cleanly to a productized offer with defined scope, fixed price, and a measurable outcome.

**2-week experiment that would change this assessment:**

1. Post one piece of specific, opinionated content targeting the \"agent that broke in prod\" pain (LinkedIn or newsletter). Measure whether anyone with budget responds or DMs.
2. Have 3 discovery calls with engineering leads who've shipped an agent. Ask specifically: where did you get stuck, what did you try to hire for, what did it cost you to fix it (or leave broken)?
3. If 2 of 3 have a budget conversation unprompted → go. If they all say \"we figured it out internally\" → the pain isn't sharp enough to productize.

Offer shape worth testing: **\"Agent to Production\" — fixed-scope, fixed-price engagement (~$8-15K) that takes an existing agent prototype and delivers: production deployment, observability setup, cost optimization report, and a runbook.** Stack on a monthly retainer for ongoing agent ops if the client has more agents in the pipeline.

      html += '<div class="modal-section">'
      html += '<div class="modal-section-label">Result</div>'
      html += '<div class="modal-section-content prose">' + escHtml(task.result) + '</div>'
      html += '</div>'
    }

    // Error
    if (task.error) {
      html += '<div class="modal-section">'
      html += '<div class="modal-section-label">Error</div>'
      html += '<div class="modal-section-content error-content">' + escHtml(task.error) + '</div>'
      html += '</div>'
    }

    // Timestamps
    html += '<div class="modal-section">'
    html += '<div class="modal-section-label">Timestamps</div>'
    html += '<div class="modal-timestamps">'
    html += '<div class="modal-ts-item"><div class="modal-ts-label">Created</div><div class="modal-ts-value">' + formatTs(task.created_at) + '</div></div>'
    html += '<div class="modal-ts-item"><div class="modal-ts-label">Started</div><div class="modal-ts-value">' + formatTs(task.started_at) + '</div></div>'
    html += '<div class="modal-ts-item"><div class="modal-ts-label">Completed</div><div class="modal-ts-value">' + formatTs(task.completed_at) + '</div></div>'
    html += '<div class="modal-ts-item"><div class="modal-ts-label">Duration</div><div class="modal-ts-value">' + formatDuration(task.started_at, task.completed_at) + '</div></div>'
    html += '</div>'
    html += '</div>'

    bodyEl.innerHTML = html
    overlay.classList.add('open')
    document.body.style.overflow = 'hidden'
  }

  function closeModal() {
    const overlay = document.getElementById('modal-overlay')
    overlay.classList.remove('open')
    document.body.style.overflow = ''
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
  }

  function setDateChip() {
    const chip = document.getElementById('date-range-chip')
    if (!chip) return
    const now = new Date()
    const from = new Date(now.getTime() - 14 * 86400 * 1000)
    const fmt = (d) => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
    chip.textContent = fmt(from) + ' – ' + fmt(now)
  }

  function init() {
    setDateChip()

    const board = document.getElementById('board-grid')
    COLUMNS.forEach(col => board.appendChild(buildColumn(col)))

    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) closeModal()
    })
    document.getElementById('modal-close').addEventListener('click', closeModal)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal()
    })
  }

  document.addEventListener('DOMContentLoaded', init)
})()
</script>
</body>
</html>
