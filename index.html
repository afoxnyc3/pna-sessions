<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control</title>

  <!-- PWA -->
  <link rel="manifest" href="/app.webmanifest" />
  <meta name="theme-color" content="#060d1f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mission Control" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:            #060d1f;
      --surface:       #0d1b35;
      --surface-2:     #111e3d;
      --border:        rgba(59,130,246,0.15);
      --border-strong: rgba(59,130,246,0.35);
      --text:          #e2e8f0;
      --muted:         #94a3b8;
      --text-muted:    #475569;
      --primary:       #3b82f6;
      --accent:        #3b82f6;
      --tag-bg:        #111e3d;
      --tag-border:    rgba(59,130,246,0.15);
      --hover:         #111e3d;
      --font-body:     'DM Sans', system-ui, sans-serif;
      --font-mono:     'Fira Code', 'Courier New', monospace;
      --dot-session:    #22c55e;
      --dot-diagram:    #3b82f6;
      --dot-brainstorm: #f59e0b;
      --dot-design:     #a855f7;
      --dot-research:   #06b6d4;
      --dot-postmortem: #ef4444;
      --safe-bottom:    env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100dvh;
      padding-bottom: var(--safe-bottom);
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 13, 31, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .logo-mark {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo-sep {
      color: var(--border-strong);
      font-size: 14px;
    }
    .logo-name {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .meta { font-size: 11px; color: var(--muted); }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      flex-shrink: 0;
    }

    /* ── Main ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      gap: 12px;
    }

    .filters {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex: 1;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-btn:hover    { color: var(--text); border-color: var(--border-strong); }
    .filter-btn.active   { color: var(--accent); border-color: var(--border-strong); background: rgba(59,130,246,0.06); }

    .legend {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-shrink: 0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* ── Artifact list ── */
    .artifact-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .artifact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border: 1px solid transparent;
      border-radius: 5px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.1s, border-color 0.1s;
    }
    .artifact-item:hover {
      background: var(--hover);
      border-color: var(--border);
    }

    .type-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-session    { background: var(--dot-session); }
    .dot-diagram    { background: var(--dot-diagram); }
    .dot-brainstorm { background: var(--dot-brainstorm); }
    .dot-design     { background: var(--dot-design); }
    .dot-research   { background: var(--dot-research); }
    .dot-postmortem { background: var(--dot-postmortem); }

    .artifact-date  { font-size: 11px; color: var(--muted); min-width: 84px; flex-shrink: 0; }
    .artifact-agent { font-size: 10px; color: var(--muted); min-width: 120px; flex-shrink: 0; letter-spacing: 0.03em; }
    .artifact-title { flex: 1; font-size: 13px; }
    .artifact-tags  { display: flex; gap: 5px; flex-wrap: wrap; }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 3px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .empty {
      color: var(--muted);
      font-size: 12px;
      padding: 40px 0;
      text-align: center;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 64px;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      header { padding: 12px 16px; }
      main   { padding: 20px 16px 48px; }

      .legend { display: none; }

      .artifact-item {
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 12px;
      }
      .artifact-agent { display: none; }
      .artifact-date  { min-width: auto; }
      .artifact-title { width: 100%; flex: none; }
      .artifact-tags  { width: 100%; }

      footer { margin-top: 32px; }
    }

    /* ── Install banner (mobile only, hidden by default) ── */
    #install-bar {
      display: none;
      position: fixed;
      bottom: calc(0px + var(--safe-bottom));
      left: 0;
      right: 0;
      background: var(--surface-2);
      border-top: 1px solid var(--border-strong);
      padding: 12px 20px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 500;
    }
    #install-bar.visible { display: flex; }
    .install-text { font-size: 12px; color: var(--text); }
    .install-text span { color: var(--muted); font-size: 11px; }
    .install-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .install-dismiss {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-mark">P&amp;A</span>
      <span class="logo-sep">/</span>
      <span class="logo-name">Mission Control</span>
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <div class="meta" id="item-count">Loading...</div>
    </div>
  </header>

  <nav style="border-bottom:1px solid var(--border);padding:0 24px;height:40px;display:flex;align-items:center;gap:4px;background:rgba(6,13,31,0.5);">
    <a href="kanban.html" style="font-size:11px;font-weight:500;color:var(--text-muted);text-decoration:none;padding:4px 10px;border-radius:6px;transition:color 0.15s,background 0.15s;" onmouseover="this.style.color='var(--text)';this.style.background='rgba(59,130,246,0.08)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">Kanban</a>
    <a href="backlog.html" style="font-size:11px;font-weight:500;color:var(--text-muted);text-decoration:none;padding:4px 10px;border-radius:6px;transition:color 0.15s,background 0.15s;" onmouseover="this.style.color='var(--text)';this.style.background='rgba(59,130,246,0.08)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">Backlog</a>
    <a href="tracing.html" style="font-size:11px;font-weight:500;color:var(--text-muted);text-decoration:none;padding:4px 10px;border-radius:6px;transition:color 0.15s,background 0.15s;" onmouseover="this.style.color='var(--text)';this.style.background='rgba(59,130,246,0.08)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">Tracing</a>
    <a href="library.html" style="font-size:11px;font-weight:500;color:var(--text-muted);text-decoration:none;padding:4px 10px;border-radius:6px;transition:color 0.15s,background 0.15s;" onmouseover="this.style.color='var(--text)';this.style.background='rgba(59,130,246,0.08)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">Library</a>
  </nav>

  <main>
    <div class="toolbar">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="session">Sessions</button>
        <button class="filter-btn" data-filter="diagram">Diagrams</button>
        <button class="filter-btn" data-filter="brainstorm">Brainstorms</button>
        <button class="filter-btn" data-filter="design">Designs</button>
        <button class="filter-btn" data-filter="research">Research</button>
        <button class="filter-btn" data-filter="postmortem">Postmortems</button>
      </div>
      <div class="legend">
        <div class="legend-item"><span class="type-dot dot-session"></span>session</div>
        <div class="legend-item"><span class="type-dot dot-diagram"></span>diagram</div>
        <div class="legend-item"><span class="type-dot dot-brainstorm"></span>brainstorm</div>
        <div class="legend-item"><span class="type-dot dot-design"></span>design</div>
        <div class="legend-item"><span class="type-dot dot-research"></span>research</div>
        <div class="legend-item"><span class="type-dot dot-postmortem"></span>postmortem</div>
      </div>
    </div>

    <div class="artifact-list" id="artifact-list">
      <div class="empty">Loading...</div>
    </div>
  </main>

  <footer>principal &amp; agent &mdash; internal &mdash; control.pna.agency</footer>

  <!-- Install banner (A2HS prompt) -->
  <div id="install-bar">
    <div class="install-text">
      Add to Home Screen<br>
      <span>Works offline, native app feel</span>
    </div>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="install-dismiss" id="install-dismiss" aria-label="Dismiss">&times;</button>
  </div>

  <script>
    /* ── Manifest + filter logic ── */
    let allEntries = [];
    let activeFilter = 'all';

    const PLURALS = {
      session: 'sessions', diagram: 'diagrams', brainstorm: 'brainstorms',
      design: 'designs', research: 'research', postmortem: 'postmortems'
    };

    async function loadManifest() {
      try {
        const res = await fetch('./manifest.json');
        if (!res.ok) throw new Error('no manifest');
        allEntries = await res.json();
        render();
      } catch {
        document.getElementById('item-count').textContent = '0 items';
        document.getElementById('artifact-list').innerHTML =
          '<div class="empty">No artifacts yet.</div>';
      }
    }

    function render() {
      const list    = document.getElementById('artifact-list');
      const count   = document.getElementById('item-count');
      const filtered = activeFilter === 'all'
        ? allEntries
        : allEntries.filter(e => e.type === activeFilter);

      const label = activeFilter === 'all' ? 'items' : (PLURALS[activeFilter] || activeFilter + 's');
      count.textContent = `${filtered.length} ${label}`;

      if (!filtered.length) {
        list.innerHTML = '<div class="empty">Nothing here yet.</div>';
        return;
      }

      list.innerHTML = filtered
        .slice()
        .reverse()
        .map(e => `
          <a class="artifact-item" href="./${e.path}">
            <span class="type-dot dot-${e.type}"></span>
            <span class="artifact-date">${e.date}</span>
            <span class="artifact-agent">${e.agent}</span>
            <span class="artifact-title">${e.title}</span>
            <span class="artifact-tags">${(e.tags || [])
              .map(t => `<span class="tag">${t}</span>`).join('')}</span>
          </a>
        `).join('');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        render();
      });
    });

    loadManifest();

    /* ── Service Worker ── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    /* ── Add to Home Screen (A2HS) ── */
    let deferredPrompt = null;
    const installBar  = document.getElementById('install-bar');
    const installBtn  = document.getElementById('install-btn');
    const dismissBtn  = document.getElementById('install-dismiss');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      // Only show on mobile
      if (window.innerWidth <= 768) {
        installBar.classList.add('visible');
      }
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBar.classList.remove('visible');
    });

    dismissBtn.addEventListener('click', () => {
      installBar.classList.remove('visible');
      sessionStorage.setItem('mc-install-dismissed', '1');
    });

    window.addEventListener('appinstalled', () => {
      installBar.classList.remove('visible');
    });
  </script>
</body>
</html>
