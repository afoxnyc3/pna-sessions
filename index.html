<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P&A Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #060d1f;
      --surface:       #0d1b35;
      --surface-2:     #111e3d;
      --border:        rgba(59,130,246,0.15);
      --border-strong: rgba(59,130,246,0.35);
      --text:          #e2e8f0;
      --muted:         #94a3b8;
      --text-muted:    #475569;
      --primary:       #3b82f6;
      --accent:        #3b82f6;
      --tag-bg:        #111e3d;
      --tag-border:    rgba(59,130,246,0.15);
      --hover:         #111e3d;
      --font-body:     'DM Sans', system-ui, sans-serif;
      --font-mono:     'Fira Code', 'Courier New', monospace;
      --dot-session:    #22c55e;
      --dot-diagram:    #3b82f6;
      --dot-brainstorm: #f59e0b;
      --dot-design:     #a855f7;
      --dot-research:   #06b6d4;
      --dot-postmortem: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .logo strong { color: var(--accent); }
    .meta { font-size: 11px; color: var(--muted); }
    main { max-width: 900px; margin: 0 auto; padding: 32px; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .filters { display: flex; gap: 6px; }
    .filter-btn {
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }
    .filter-btn:hover    { color: var(--text); border-color: var(--border-strong); }
    .filter-btn.active   { color: var(--accent); border-color: var(--border-strong); }
    .legend {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .artifact-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .artifact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 14px;
      border: 1px solid transparent;
      border-radius: 4px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.1s, border-color 0.1s;
    }
    .artifact-item:hover {
      background: var(--hover);
      border-color: var(--border);
    }
    .type-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-session    { background: var(--dot-session); }
    .dot-diagram    { background: var(--dot-diagram); }
    .dot-brainstorm { background: var(--dot-brainstorm); }
    .dot-design     { background: var(--dot-design); }
    .dot-research    { background: var(--dot-research); }
    .dot-postmortem  { background: var(--dot-postmortem); }
    .artifact-date {
      font-size: 11px;
      color: var(--muted);
      min-width: 90px;
      flex-shrink: 0;
    }
    .artifact-agent {
      font-size: 10px;
      color: var(--muted);
      min-width: 130px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }
    .artifact-title { flex: 1; font-size: 13px; }
    .artifact-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      padding: 2px 7px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 3px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .empty {
      color: var(--muted);
      font-size: 12px;
      padding: 32px 0;
      text-align: center;
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 16px 32px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 64px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"><strong>P&amp;A</strong> / Archive</div>
    <div class="meta" id="item-count">Loading...</div>
  </header>

  <main>
    <div class="toolbar">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="session">Sessions</button>
        <button class="filter-btn" data-filter="diagram">Diagrams</button>
        <button class="filter-btn" data-filter="brainstorm">Brainstorms</button>
        <button class="filter-btn" data-filter="design">Designs</button>
        <button class="filter-btn" data-filter="research">Research</button>
        <button class="filter-btn" data-filter="postmortem">Postmortems</button>
      </div>
      <div class="legend">
        <div class="legend-item"><span class="type-dot dot-session"></span>session</div>
        <div class="legend-item"><span class="type-dot dot-diagram"></span>diagram</div>
        <div class="legend-item"><span class="type-dot dot-brainstorm"></span>brainstorm</div>
        <div class="legend-item"><span class="type-dot dot-design"></span>design</div>
        <div class="legend-item"><span class="type-dot dot-research"></span>research</div>
        <div class="legend-item"><span class="type-dot dot-postmortem"></span>postmortem</div>
      </div>
    </div>

    <div class="artifact-list" id="artifact-list">
      <div class="empty">Loading...</div>
    </div>
  </main>

  <footer>Principal &amp; Agent &mdash; internal</footer>

  <script>
    let allEntries = [];
    let activeFilter = 'all';

    async function loadManifest() {
      try {
        const res = await fetch('./manifest.json');
        if (!res.ok) throw new Error('no manifest');
        allEntries = await res.json();
        render();
      } catch {
        document.getElementById('item-count').textContent = '0 items';
        document.getElementById('artifact-list').innerHTML =
          '<div class="empty">No artifacts yet.</div>';
      }
    }

    function render() {
      const list  = document.getElementById('artifact-list');
      const count = document.getElementById('item-count');

      const filtered = activeFilter === 'all'
        ? allEntries
        : allEntries.filter(e => e.type === activeFilter);

      const plurals = { session: 'sessions', diagram: 'diagrams', brainstorm: 'brainstorms', design: 'designs', research: 'research', postmortem: 'postmortems' };
      const label = activeFilter === 'all' ? 'items' : (plurals[activeFilter] || activeFilter + 's');
      count.textContent = `${filtered.length} ${label}`;

      if (!filtered.length) {
        list.innerHTML = '<div class="empty">Nothing here yet.</div>';
        return;
      }

      list.innerHTML = filtered
        .slice()
        .reverse()
        .map(e => `
          <a class="artifact-item" href="./${e.path}">
            <span class="type-dot dot-${e.type}"></span>
            <span class="artifact-date">${e.date}</span>
            <span class="artifact-agent">${e.agent}</span>
            <span class="artifact-title">${e.title}</span>
            <span class="artifact-tags">${(e.tags || [])
              .map(t => `<span class="tag">${t}</span>`).join('')}</span>
          </a>
        `).join('');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        render();
      });
    });

    loadManifest();
  </script>
</body>
</html>
